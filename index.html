        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f0c20, #150e2a, #110721); color: white; min-height: 100vh; }

        .logo span { color: var(--primary); }
        .logo img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        button { border: none; cursor: pointer; transition: 0.3s; }

        .theme-btn { background: #ff256b; color: black; font-weight: bold; }

        .search-box input { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #110d27; color: white; font-size: 14px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        .admin-section { background: #110d27; margin: 15px; padding: 15px; border-radius: 15px; display: none; }
        .admin-section h3 { margin-bottom: 12px; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; background: #1a1337; color: white; font-weight: 600; }

        .loader { width: 40px; height: 40px; border: 4px solid #fff; border-top: 4px solid #f05c5c; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; padding: 15px; }
        .video-card { background: #110d27; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .video-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 25px rgba(100,20,240,0.4); }
        .trending { position: absolute; top: 8px; left: 8px; background: #ee4266; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        video { width: 100%; aspect-ratio: 16/9; background: black; }
        .video-info { padding: 12px; }
        .video-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .preview-badge { display: inline-block; background: var(--primary); color: white; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .watching { position: absolute; top: 8px; right: 8px; background: red; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; z-index: 10; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .video-actions { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; background: #1a1337; color: white; border-radius: 10px; font-size: 11px; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .action-btn.views { background: #231b42; color: #aaa; cursor: default; }
        .views { margin-top: 10px; color: #8a81a6; font-size: 11px; }
        .comments { margin-top: 8px; }
        .comment-input { margin-top: 8px; }
        .comment-input input { height: 35px; padding: 0 10px; font-size: 12px; }
        .comment-box { width: 100%; margin-top: 6px; padding: 8px; background: var(--primary); color: white; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .show-comments-btn { width: 100%; margin-top: 10px; padding: 5px; border-radius: 6px; background: #1a1337; color: #8a81a6; font-size: 11px; font-weight: 600; text-align: center; cursor: pointer; }
        .comments-container { display: none; margin-top: 8px; }
        .comment { bg-color: #1a1337; padding: 8px; border-radius: 8px; margin-top: 6px; font-size: 11px; color: #ccc; border-left: 3px solid var(--primary); }
        footer { text-align: center; padding: 25px; color: #8a81a6; font-size: 12px; }
        @media (max-width: 768px) { header { flex-direction: column; gap: 10px; } .grid { grid-template-columns: 1fr; } }
