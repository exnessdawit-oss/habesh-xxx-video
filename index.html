<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <style>
        body { 
            background-image: url('IMG_20260514_012150_661.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .video-card { 
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
        }
        video { width: 100%; display: block; background: #000; height: 200px; }
        h3 { font-size: 16px; padding: 15px; margin: 0; color: #fff; text-align: center; }
        h2 { color: #ffffff; text-align: center; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <h2>የቪዲዮ ማዕከል</h2>
    <div class="gallery" id="videoGallery"></div>
    <script>
        const gallery = document.getElementById('videoGallery');
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = '<video controls playsinline style="width:100%"><source src="IMG_20260514_012019_644.mp4" type="video/mp4"></video><h3>አዲሱ ቪዲዮ</h3>';
        gallery.appendChild(card);
    </script>
</body>
</html>
