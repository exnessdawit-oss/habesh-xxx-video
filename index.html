<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HABESHA PREMIUM</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#ff3366;
    --dark:#0f0c20;
    --card:#17112d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f0c20,#150e2a,#110721);
    color:white;
    min-height:100vh;
}

body.light{
    background:#f2f2f2;
    color:#111;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:rgba(17,13,38,0.8);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:700;
}

.logo span{
    color:var(--primary);
}

.logo img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--primary);
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    cursor:pointer;
}

.theme-btn,
.admin-btn{
    padding:10px 14px;
    border-radius:12px;
    background:#251d48;
    color:white;
    font-weight:600;
}

.theme-btn{
    background:var(--primary);
    color:white;
}

.search-box{
    padding:15px;
    position:relative;
}

.search-box span{
    position:absolute;
    left:28px;
    top:28px;
    font-size:14px;
    color:#aaa;
}

.search-box input{
    width:100%;
    padding:14px 14px 14px 40px;
    border:none;
    border-radius:14px;
    background:#1a1337;
    color:white;
    font-size:14px;
}

.admin-section{
    display:none;
    margin:15px;
    padding:15px;
    border-radius:16px;
    background:rgba(23,17,45,0.9);
    backdrop-filter:blur(10px);
}

.admin-section h3{
    margin-bottom:12px;
    color:var(--primary);
}

.admin-section input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#241b46;
    color:white;
}

#upload-btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-weight:bold;
}

.categories{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:0 15px 10px;
}

.categories button{
    padding:8px 14px;
    border-radius:30px;
    background:#241b46;
    color:white;
    white-space:nowrap;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
    padding:15px;
}

.video-card{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    background:rgba(23,17,45,0.9);
    backdrop-filter:blur(12px);
    transition:0.3s;
}

.video-card:hover{
    transform:translateY(-4px);
}

video{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

.play-icon{
    position:absolute;
    top:35%;
    left:50%;
    transform:translate(-50%,-50%);
    width:75px;
    height:75px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    pointer-events:none;
}

.trending{
    position:absolute;
    top:10px;
    left:10px;
    padding:5px 10px;
    border-radius:8px;
    background:#ff3366;
    font-size:11px;
    font-weight:bold;
    z-index:10;
}

.watching{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    padding:5px 10px;
    border-radius:8px;
    font-size:11px;
    z-index:10;
}

.video-info{
    padding:14px;
}

.video-title{
    font-size:15px;
    font-weight:600;
    margin-bottom:10px;
}

.video-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.action-btn{
    flex:1;
    padding:10px;
    border-radius:10px;
    background:#241b46;
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

.comments-container{
    display:none;
    margin-top:12px;
}

.comment{
    padding:8px;
    border-radius:10px;
    background:#241b46;
    margin-top:6px;
    font-size:12px;
}

.comment-input input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#241b46;
    color:white;
}

.comment-box{
    margin-top:8px;
    padding:10px;
    border-radius:10px;
    background:var(--primary);
    text-align:center;
    font-size:13px;
    font-weight:bold;
    cursor:pointer;
}

.skeleton{
    height:260px;
    border-radius:18px;
    background:linear-gradient(
        90deg,
        #1b1435 25%,
        #241b46 50%,
        #1b1435 75%
    );
    background-size:400% 100%;
    animation:loading 1.2s infinite;
}

@keyframes loading{
    0%{
        background-position:100% 0;
    }
    100%{
        background-position:-100% 0;
    }
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#120d26;
    display:flex;
    justify-content:space-around;
    padding:12px;
    z-index:999;
    border-top:1px solid rgba(255,255,255,0.08);
}

.bottom-nav div{
    text-align:center;
    font-size:12px;
}

footer{
    padding:30px 20px 100px;
    text-align:center;
    color:#888;
}

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:10px;
    }

    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="https://i.ibb.co/5R4bcJz/IMG-20260312-113744-302.jpg">
HABESHA <span>PREMIUM</span>
</div>

<div class="buttons">
<button class="theme-btn" id="theme-toggle">Theme</button>
<button class="admin-btn" id="admin-toggle">Admin</button>
</div>

</header>

<div class="search-box">
<span>🔍</span>
<input type="text" id="search-input" placeholder="ፈልግ...">
</div>

<div class="categories">
<button>🔥 Trending</button>
<button>🎬 Movies</button>
<button>📺 Shorts</button>
<button>💎 Premium</button>
<button>😂 Funny</button>
<button>🎵 Music</button>
</div>

<div class="admin-section" id="admin-panel">

<h3>አዲስ ቪዲዮ ጫን</h3>

<input type="text" id="video-title" placeholder="የቪዲዮ ርዕስ">

<input type="text" id="video-url" placeholder="MP4 Link">

<input type="password" id="admin-pass" placeholder="Admin Password">

<button id="upload-btn">UPLOAD VIDEO</button>

</div>

<div class="grid" id="video-grid">

<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

<footer>
© 2026 HABESHA PREMIUM
</footer>

<div class="bottom-nav">
<div>🏠<br>Home</div>
<div>🔥<br>Trending</div>
<div>➕<br>Upload</div>
<div>👤<br>Profile</div>
</div>

<script>

const firebaseConfig = {
    databaseURL:"https://YOUR-FIREBASE-URL.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();

const videoGrid = document.getElementById("video-grid");
const adminPanel = document.getElementById("admin-panel");
const adminToggle = document.getElementById("admin-toggle");
const uploadBtn = document.getElementById("upload-btn");
const themeToggle = document.getElementById("theme-toggle");
const searchInput = document.getElementById("search-input");

let allVideos = [];

if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light");
}

themeToggle.onclick = () => {

    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
        localStorage.setItem("theme","light");
    }else{
        localStorage.setItem("theme","dark");
    }
};

adminToggle.onclick = () => {

    adminPanel.style.display =
    adminPanel.style.display === "block"
    ? "none"
    : "block";
};

uploadBtn.onclick = () => {

    const title =
    document.getElementById("video-title").value.trim();

    const url =
    document.getElementById("video-url").value.trim();

    const pass =
    document.getElementById("admin-pass").value.trim();

    if(pass !== "dawit123"){
        alert("Wrong Password");
        return;
    }

    if(!title || !url){
        alert("Fill All Fields");
        return;
    }

    uploadBtn.innerText = "Uploading...";

    database.ref("videos").push({

        title:title,
        url:url,
        views:0,
        likes:0,
        watching:Math.floor(Math.random()*100)+1,
        createdAt:Date.now()

    }).then(()=>{

        alert("Uploaded Successfully");

        document.getElementById("video-title").value = "";
        document.getElementById("video-url").value = "";
        document.getElementById("admin-pass").value = "";

        uploadBtn.innerText = "UPLOAD VIDEO";

    });
};

function loadVideos(){

    database.ref("videos").on("value",(snapshot)=>{

        videoGrid.innerHTML = "";

        allVideos = [];

        const data = snapshot.val();

        if(!data){

            videoGrid.innerHTML =
            "<h2>No Videos</h2>";

            return;
        }

        for(let key in data){

            allVideos.push({
                id:key,
                ...data[key]
            });
        }

        allVideos.sort((a,b)=>b.createdAt-a.createdAt);

        displayVideos(allVideos);
    });
}

function displayVideos(videos){

    videoGrid.innerHTML = "";

    videos.forEach((video,index)=>{

        const card = document.createElement("div");

        card.className = "video-card";

        card.innerHTML = `

        <div class="trending">PREMIUM</div>

        <div class="watching">
        🔴 ${video.watching || 1} watching
        </div>

        <div class="play-icon">▶</div>

        <video controls playsinline preload="metadata">

        <source src="${video.url}" type="video/mp4">

        </video>

        <div class="video-info">

        <div class="video-title">
        ${video.title}
        </div>

        <div class="video-actions">

        <div class="action-btn">
        👁 ${video.views || 0}
        </div>

        <div class="action-btn"
        onclick="likeVideo('${video.id}')">

        ❤️ ${video.likes || 0}

        </div>

        <div class="action-btn"
        onclick="shareVideo('${video.id}')">

        🔗 Share

        </div>

        </div>

        <div class="action-btn"
        style="margin-top:10px;"
        onclick="toggleComments('${video.id}')">

        💬 Comments

        </div>

        <div class="comments-container"
        id="comments-${video.id}">

        <div id="list-${video.id}"></div>

        <div class="comment-input">

        <input type="text"
        id="input-${video.id}"
        placeholder="Write comment...">

        <div class="comment-box"
        onclick="addComment('${video.id}')">

        Send

        </div>

        </div>

        </div>

        </div>
        `;

        videoGrid.appendChild(card);

        const videoElement =
        card.querySelector("video");

        videoElement.addEventListener("play",()=>{

            database.ref(
            "videos/" + video.id + "/views"
            ).transaction((views)=>{

                return (views || 0) + 1;

            });

        },{ once:true });

        setInterval(()=>{

            const watching =
            card.querySelector(".watching");

            const random =
            Math.floor(Math.random()*100)+1;

            watching.innerHTML =
            `🔴 ${random} watching`;

        },5000);

        if((index + 1) % 4 === 0){

            const ad = document.createElement("div");

            ad.innerHTML = `
            <div style="
            background:#241b46;
            border-radius:18px;
            padding:30px;
            text-align:center;
            font-size:18px;
            font-weight:bold;
            ">
            ADVERTISEMENT
            </div>
            `;

            videoGrid.appendChild(ad);
        }
    });
}

window.likeVideo = function(id){

    database.ref(
    "videos/" + id + "/likes"
    ).transaction((likes)=>{

        return (likes || 0) + 1;

    });
};

window.shareVideo = function(id){

    const link =
    window.location.origin +
    window.location.pathname +
    "?v=" + id;

    navigator.clipboard.writeText(link)
    .then(()=>{

        alert("Link Copied");

    });
};

window.toggleComments = function(id){

    const container =
    document.getElementById(`comments-${id}`);

    if(container.style.display === "block"){

        container.style.display = "none";

    }else{

        container.style.display = "block";

        loadComments(id);
    }
};

function loadComments(id){

    const list =
    document.getElementById(`list-${id}`);

    database.ref(`comments/${id}`)
    .on("value",(snapshot)=>{

        list.innerHTML = "";

        const data = snapshot.val();

        if(!data){

            list.innerHTML =
            "<p>No comments yet</p>";

            return;
        }

        for(let key in data){

            const div =
            document.createElement("div");

            div.className = "comment";

            div.innerText = data[key].text;

            list.appendChild(div);
        }
    });
}

window.addComment = function(id){

    const input =
    document.getElementById(`input-${id}`);

    const text = input.value.trim();

    if(!text){
        return;
    }

    database.ref(`comments/${id}`).push({

        text:text,
        timestamp:Date.now()

    }).then(()=>{

        input.value = "";

    });
};

searchInput.addEventListener("input",(e)=>{

    const query =
    e.target.value.toLowerCase();

    const filtered =
    allVideos.filter(video=>

        video.title
        .toLowerCase()
        .includes(query)

    );

    displayVideos(filtered);
});

window.onload = ()=>{

    loadVideos();
};

</script>

</body>
</html>
