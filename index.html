<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HABESHA PREMIUM</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#8b5cf6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#050816,#0f172a,#111827);
color:white;
transition:0.3s;
}

/* LIGHT MODE */

.light{
background:#f3f4f6;
color:black;
}

.light header,
.light .video-card,
.light .admin-section,
.light input,
.light .search-box input{
background:white;
color:black;
}

/* HEADER */

header{
background:#0f172a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:700;
}

.logo span{
color:var(--primary);
}

.site-logo{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--primary);
}

/* BUTTONS */

.top-buttons{
display:flex;
gap:8px;
}

button{
border:none;
cursor:pointer;
transition:0.3s;
}

.login-btn,
.search-btn,
.theme-btn{
background:#1f2937;
color:white;
padding:10px 14px;
border-radius:10px;
font-size:13px;
}

.theme-btn{
background:#f59e0b;
color:black;
font-weight:bold;
}

/* SEARCH */

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

/* ADMIN */

.admin-section{
background:#111827;
margin:15px;
padding:15px;
border-radius:15px;
display:none;
}

.admin-section h3{
margin-bottom:12px;
color:var(--primary);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

.upload-btn{
width:100%;
padding:12px;
border-radius:10px;
background:var(--primary);
color:white;
font-weight:bold;
}

/* LOADER */

.loader{
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #8b5cf6;
border-radius:50%;
animation:spin 1s linear infinite;
margin:40px auto;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* VIDEO GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
padding:15px;
}

/* VIDEO CARD */

.video-card{
background:#111827;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
position:relative;
transition:0.3s;
}

.video-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 10px 25px rgba(139,92,246,.4);
}

/* TRENDING */

.trending{
position:absolute;
top:8px;
left:8px;
background:#ef4444;
color:white;
padding:5px 8px;
border-radius:8px;
font-size:10px;
font-weight:bold;
}

/* VIDEO */

video{
width:100%;
aspect-ratio:16/9;
background:black;
}

/* VIDEO INFO */

.video-info{
padding:12px;
}

.video-title{
font-size:15px;
font-weight:600;
margin-bottom:8px;
}

/* PREMIUM */

.badge{
display:inline-block;
background:var(--primary);
color:white;
padding:4px 10px;
border-radius:20px;
font-size:10px;
font-weight:bold;
}

/* DELETE BUTTON */

.del-btn{
position:absolute;
top:8px;
right:8px;
background:red;
color:white;
padding:6px 10px;
border-radius:8px;
font-size:11px;
}

/* ACTIONS */

.video-actions{
display:flex;
gap:6px;
margin-top:10px;
}

.action-btn{
flex:1;
padding:9px;
background:#1f2937;
color:white;
border-radius:10px;
font-size:11px;
}

.download-btn{
background:#22c55e;
color:black;
font-weight:bold;
}

.save-btn{
background:#eab308;
color:black;
font-weight:bold;
}

/* VIEWS */

.views{
margin-top:8px;
color:#9ca3af;
font-size:11px;
}

/* COMMENTS */

.comment-box{
margin-top:10px;
}

.comment-box input{
height:35px;
padding:6px 10px;
font-size:12px;
}

.comment-btn{
width:100%;
margin-top:6px;
padding:8px;
border-radius:8px;
background:var(--primary);
color:white;
font-size:12px;
}

.show-comments-btn{
width:100%;
margin-top:6px;
padding:7px;
border-radius:8px;
background:#374151;
color:white;
font-size:11px;
}

.comments-container{
display:none;
margin-top:8px;
}

.comment-item{
background:#1f2937;
padding:6px 8px;
border-radius:8px;
margin-top:5px;
font-size:11px;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
color:#94a3b8;
font-size:12px;
}

/* MOBILE */

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="logo">

<img
src="https://i.ibb.co/9H4bcJmz/IMG-20260515-123744-362.jpg"
class="site-logo">

HABESHA <span>PREMIUM</span>

</div>

<div class="top-buttons">

<button class="search-btn">
🔍 Search
</button>

<button
class="theme-btn"
onclick="toggleTheme()">

🌙 Theme

</button>

<button
class="login-btn"
onclick="adminLogin()">

Admin Login

</button>

</div>

</header>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ቪዲዮ ፈልግ..."
onkeyup="searchVideos()">

</div>

<div id="adminPanel" class="admin-section">

<h3>🎬 Upload Video</h3>

<input
type="text"
id="vTitle"
placeholder="Video Title">

<input
type="text"
id="vThumb"
placeholder="Thumbnail Link">

<input
type="text"
id="vUrl"
placeholder="Video URL">

<button
class="upload-btn"
onclick="addVideo()">

➕ Upload Video

</button>

</div>

<div id="loader" class="loader"></div>

<div class="grid" id="videoGrid"></div>

<footer>
© 2026 HABESHA PREMIUM
</footer>

<script>

/* FIREBASE */

const firebaseConfig = {

databaseURL:
"https://habesha-xxx-video-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ADMIN */

let isAdmin = false;

const MY_PASSWORD = "1234";

/* LOGIN */

function adminLogin(){

const pass =
prompt("Enter Admin Password");

if(pass === MY_PASSWORD){

isAdmin = true;

document.getElementById("adminPanel")
.style.display = "block";

renderVideos();

alert("Welcome Admin!");

}else{

alert("Wrong Password!");
}
}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light");

localStorage.setItem(
"theme",
document.body.classList.contains("light")
? "light"
: "dark"
);
}

/* LOAD THEME */

if(localStorage.getItem("theme") === "light"){

document.body.classList.add("light");
}

/* ADD VIDEO */

function addVideo(){

if(!isAdmin){

return alert("Login First!");
}

const title =
document.getElementById("vTitle").value;

const thumb =
document.getElementById("vThumb").value;

let url =
document.getElementById("vUrl").value;

if(url.includes("dropbox.com")){

url = url.replace("dl=0","raw=1");
}

if(title && thumb && url){

db.ref("videos").push({

title:title,

thumbnail:thumb,

videoUrl:url,

createdAt:Date.now()

})

.then(()=>{

showToast("Video Uploaded!");

document.getElementById("vTitle").value = "";

document.getElementById("vThumb").value = "";

document.getElementById("vUrl").value = "";

});
}
}

/* DELETE */

function deleteVideo(id){

if(confirm("Delete Video?")){

db.ref("videos/" + id).remove();

showToast("Video Deleted!");
}
}

/* SEARCH */

function searchVideos(){

const value =
document.getElementById("searchInput")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".video-card");

cards.forEach(card=>{

const title =
card.querySelector(".video-title")
.innerText
.toLowerCase();

if(title.includes(value)){

card.style.display = "block";

}else{

card.style.display = "none";
}
});
}

/* LIKE */

function likeVideo(id){

const likedVideos =
JSON.parse(
localStorage.getItem("likedVideos")
) || [];

if(likedVideos.includes(id)){

alert("Already Liked!");

return;
}

const likeRef =
db.ref("likes/" + id);

likeRef.transaction((likes)=>{

return (likes || 1000) + 1;

});

likedVideos.push(id);

localStorage.setItem(
"likedVideos",
JSON.stringify(likedVideos)
);
}

/* LOAD LIKES */

function loadLikes(id){

db.ref("likes/" + id)
.on("value",(snap)=>{

const likes = snap.val();

document.getElementById(
"like-" + id)
.innerText =
likes ? likes : 1000;

});
}

/* VIEWS */

function addView(id){

const viewedVideos =
JSON.parse(
localStorage.getItem("viewedVideos")
) || [];

if(viewedVideos.includes(id)){

return;
}

const viewRef =
db.ref("views/" + id);

viewRef.transaction((views)=>{

return (views || 1000) + 1;

});

viewedVideos.push(id);

localStorage.setItem(
"viewedVideos",
JSON.stringify(viewedVideos)
);
}

/* LOAD VIEWS */

function loadViews(id){

db.ref("views/" + id)
.on("value",(snap)=>{

const views = snap.val();

document.getElementById(
"view-" + id)
.innerText =
views ? views : 1000;

});
}

/* SAVE VIDEO */

function saveVideo(id){

let saved =
JSON.parse(localStorage.getItem("savedVideos"))
|| [];

if(saved.includes(id)){

alert("Already Saved!");

return;
}

saved.push(id);

localStorage.setItem(
"savedVideos",
JSON.stringify(saved)
);

showToast("Video Saved!");
}

/* COMMENTS */

function addComment(videoId){

const input =
document.getElementById(
"commentInput-" + videoId);

const text = input.value;

if(text.trim() === "") return;

db.ref("comments/" + videoId)
.push({

text:text

});

input.value = "";

showToast("Comment Added!");
}

/* SHOW COMMENTS */

function toggleComments(id){

const box =
document.getElementById(
"comments-" + id);

if(box.style.display === "block"){

box.style.display = "none";

}else{

box.style.display = "block";
}
}

/* LOAD COMMENTS */

function loadComments(videoId){

db.ref("comments/" + videoId)
.on("value",(snapshot)=>{

const container =
document.getElementById(
"comments-" + videoId);

container.innerHTML = "";

snapshot.forEach((child)=>{

const data = child.val();

container.innerHTML += `

<div class="comment-item">
💬 ${data.text}
</div>

`;

});
});
}

/* TOAST */

function showToast(msg){

const toast =
document.createElement("div");

toast.innerText = msg;

toast.style.position = "fixed";

toast.style.bottom = "20px";

toast.style.right = "20px";

toast.style.background = "#8b5cf6";

toast.style.padding = "12px 20px";

toast.style.borderRadius = "10px";

toast.style.zIndex = "9999";

document.body.appendChild(toast);

setTimeout(()=>{

toast.remove();

},3000);
}

/* DISABLE RIGHT CLICK */

document.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

/* RENDER VIDEOS */

function renderVideos(){

db.ref("videos")
.on("value",(snapshot)=>{

const grid =
document.getElementById("videoGrid");

const loader =
document.getElementById("loader");

grid.innerHTML = "";

loader.style.display = "block";

snapshot.forEach((child)=>{

const data = child.val();

const key = child.key;

grid.innerHTML += `

<div class="video-card">

${isAdmin ? `

<button
class="del-btn"
onclick="deleteVideo('${key}')">

Delete

</button>

` : ''}

<div class="trending">

🔥 Trending

</div>

<video
controls
preload="none"
poster="${data.thumbnail}"
onclick="addView('${key}')">

<source
src="${data.videoUrl}"
type="video/mp4">

</video>

<div class="video-info">

<div class="video-title">

${data.title}

</div>

<span class="badge">

PREMIUM

</span>

<div class="video-actions">

<button
onclick="likeVideo('${key}')"
class="action-btn">

❤️
<span id="like-${key}">
1000
</span>

</button>

<button
onclick="saveVideo('${key}')"
class="action-btn save-btn">

⭐ Save

</button>

<button
onclick="window.open('${data.videoUrl}')"
class="action-btn download-btn">

📥 Download

</button>

</div>

<div class="views">

👁️
<span id="view-${key}">
1000
</span>

Views

</div>

<div class="comment-box">

<input
type="text"
id="commentInput-${key}"
placeholder="Comment...">

<button
class="comment-btn"
onclick="addComment('${key}')">

💬 Comment

</button>

<button
class="show-comments-btn"
onclick="toggleComments('${key}')">

📄 Show Comments

</button>

<div
class="comments-container"
id="comments-${key}">
</div>

</div>

</div>

</div>

`;

setTimeout(()=>{

loadLikes(key);

loadViews(key);

loadComments(key);

},300);

});

loader.style.display = "none";

showToast("Videos Loaded!");

});
}

/* AUTO PLAY NEXT VIDEO */

document.addEventListener(
"ended",
function(e){

if(e.target.tagName === "VIDEO"){

const videos =
document.querySelectorAll("video");

for(let i=0;i<videos.length;i++){

if(videos[i] === e.target){

if(videos[i+1]){

videos[i+1].play();

videos[i+1].scrollIntoView({
behavior:"smooth"
});
}

}
}

}
},
true
);

/* START */

renderVideos();

</script>

</body>
</html>
