<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABESHA PREMIUM | ዳዊት</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Header Design */
        header {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .brand { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .brand span { color: var(--primary); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Admin Input Panel */
        .admin-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 1px dashed #475569;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .admin-card h3 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); }

        .btn-add {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); background: #dc2626; }

        /* Video Grid Section */
        h2.section-title {
            font-size: 24px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2.section-title::before { content: ""; width: 5px; height: 25px; background: var(--primary); border-radius: 2px; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #334155;
        }

        .video-card:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-color: var(--primary); }

        .thumb-container { position: relative; width: 100%; height: 180px; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { padding: 15px; }
        .video-info h3 { margin: 0; font-size: 17px; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .player-wrapper { padding: 10px; background: #000; }
        video { width: 100%; border-radius: 6px; aspect-ratio: 16/9; }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .brand { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://i.ibb.co/VWT3hZJY/IMG-20260511-230726-744.jpg" alt="Logo" class="logo-img">
            <div class="brand">HABESHA <span>PREMIUM</span></div>
        </div>
    </header>

    <div class="container">
        <div class="admin-card">
            <h3><span>⚡</span> አዲስ ቪዲዮ ይጨምሩ</h3>
            <input type="text" id="vTitle" placeholder="የቪዲዮው ርዕስ (Title)">
            <input type="text" id="vThumb" placeholder="የተምኔል ሊንክ (Thumbnail URL)">
            <input type="text" id="vUrl" placeholder="የቪዲዮ ሊንክ (Dropbox/Drive URL)">
            <button class="btn-add" onclick="addVideo()">ቪዲዮውን አክል</button>
        </div>

        <h2 class="section-title">FEATURED CONTENT</h2>
        <div class="video-grid" id="videoContainer">
            </div>
    </div>

    <script>
        // 1. Firebase ማገናኛ (ያንተን ዳታቤዝ URL ተጠቅሜያለሁ)
        const firebaseConfig = {
            databaseURL: "https://habesha-xxx-video-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ቪዲዮ ለመጨመር
        function addVideo() {
            const title = document.getElementById('vTitle').value;
            const thumb = document.getElementById('vThumb').value;
            let url = document.getElementById('vUrl').value;

            // Dropbox ሊንክን በራስ-ሰር ማስተካከል (dl=0 to dl=1)
            if(url.includes("dropbox.com")) {
                url = url.replace("?dl=0", "?dl=1").replace("&dl=0", "&dl=1");
                if(!url.includes("dl=1")) {
                    url += (url.includes("?") ? "&" : "?") + "dl=1";
                }
            }

            if(title && thumb && url) {
                db.ref('videos').push({
                    title: title,
                    thumbnail: thumb,
                    videoUrl: url,
                    date: Date.now()
                }).then(() => {
                    alert("✅ ቪዲዮው በተሳካ ሁኔታ ተጨምሯል!");
                    // ሳጥኖቹን ባዶ ማድረግ
                    document.getElementById('vTitle').value = '';
                    document.getElementById('vThumb').value = '';
                    document.getElementById('vUrl').value = '';
                }).catch(e => alert("❌ ስህተት ተከስቷል: " + e.message));
            } else {
                alert("⚠️ እባክህ ሁሉንም መረጃዎች ሙላ!");
            }
        }

        // 3. ቪዲዮዎችን ከዳታቤዝ አውጥቶ ማሳየት
        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('videoContainer');
            container.innerHTML = ''; // ማጽዳት
            
            const data = snapshot.val();
            if(data) {
                // አዲስ የተጨመሩት መጀመሪያ እንዲታዩ መገልበጥ
                Object.keys(data).reverse().forEach(key => {
                    const video = data[key];
                    container.innerHTML += `
                        <div class="video-card">
                            <div class="thumb-container">
                                <img src="${video.thumbnail}" alt="thumbnail">
                            </div>
                            <div class="video-info">
                                <h3>${video.title}</h3>
                            </div>
                            <div class="player-wrapper">
                                <video controls poster="${video.thumbnail}">
                                    <source src="${video.videoUrl}" type="video/mp4">
                                    ብሮውዘርዎ ቪዲዮውን ማጫወት አልቻለም።
                                </video>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8;">ምንም ቪዲዮ አልተገኘም...</p>';
            }
        });
    </script>
</body>
</html>
