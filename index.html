<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habesha XXX Video</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // አንተ የላክኸው ትክክለኛው የ Firebase መረጃ
        const firebaseConfig = {
            apiKey: "AIzaSyAa0AlJrexC9S-YuA-seeUt_oO0ZOhMRwc",
            authDomain: "habesha-xxx-video.firebaseapp.com",
            projectId: "habesha-xxx-video",
            storageBucket: "habesha-xxx-video.firebasestorage.app",
            messagingSenderId: "841201015331",
            appId: "1:841201015331:web:08594d00eb793f6eaf2f96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vidsCol = collection(db, "videos");

        // ቪዲዮ ለመጨመር
        window.addVideo = async function() {
            const title = document.getElementById('vTitle').value;
            const url = document.getElementById('vUrl').value;
            if(!title || !url) return alert("እባክህ ርዕስ እና ሊንክ ሙላ!");
            
            try {
                await addDoc(vidsCol, { title, url, createdAt: Date.now() });
                alert("✅ ቪዲዮው በትክክል ተጨምሯል!");
                document.getElementById('vTitle').value = '';
                document.getElementById('vUrl').value = '';
            } catch (e) {
                alert("ስህተት ተከስቷል፦ " + e.message);
            }
        };

        // ቪዲዮዎችን ከዳታቤዝ አምጥቶ ለማሳየት
        const q = query(vidsCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            snapshot.forEach(d => {
                const v = d.data();
                grid.innerHTML += `
                <div class="card">
                    <div class="thumb" onclick="playV('${v.url}')">🎬</div>
                    <div class="info">
                        <h4>${v.title}</h4>
                        <button class="play-btn" onclick="playV('${v.url}')">▶ አጫውት</button>
                    </div>
                </div>`;
            });
        });

        window.playV = (url) => {
            document.getElementById('player').style.display = 'block';
            const v = document.getElementById('mainV');
            v.src = url;
            v.play();
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: white; padding: 15px; margin: 0; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #1e293b; border-radius: 8px; padding: 10px; text-align: center; }
        .thumb { font-size: 40px; cursor: pointer; background: #334155; padding: 20px; border-radius: 5px; }
        .play-btn { background: #2563eb; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; }
        #player { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index: 1000; }
        video { width: 100%; height: 80%; }
        .admin { margin-top: 30px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        input { width: 95%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Habesha Video Player</h2>
    
    <div class="video-grid" id="videoGrid"></div>

    <div class="admin">
        <h3>አዲስ ቪዲዮ ጨምር</h3>
        <input type="text" id="vTitle" placeholder="የርዕስ ስም">
        <input type="text" id="vUrl" placeholder="የቪዲዮ MP4 ሊንክ">
        <button class="play-btn" onclick="addVideo()" style="background: #10b981;">ቪዲዮ አክል</button>
    </div>

    <div id="player">
        <button onclick="document.getElementById('player').style.display='none'; document.getElementById('mainV').pause();" 
                style="color:white; background:red; border:none; padding:10px; width:100%; font-weight:bold;">ዝጋ (X)</button>
        <video id="mainV" controls></video>
    </div>
</body>
</html>
