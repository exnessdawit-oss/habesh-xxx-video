}

.admin-panel h2{

.admin-panel input{

padding:15px;

background:#24103f;

.badge{

background:#ff2e78;

font-size:12px;
font-weight:700;
z-index:5;
}

.watch{
position:absolute;
top:10px;
right:10px;
background:red;
padding:5px 10px;
border-radius:10px;
font-size:12px;
font-weight:700;
z-index:5;
}

video{
width:100%;
height:220px;
background:black;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.action{
flex:1;
padding:10px;
border-radius:12px;
background:#24103f;
text-align:center;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.comments{
margin-top:10px;
display:none;
}

.comments input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#24103f;
color:white;
margin-top:10px;
}

.send-comment{
margin-top:8px;
padding:10px;
background:#ff2e78;
border-radius:12px;
text-align:center;
font-weight:700;
cursor:pointer;
}

.comment{
background:#24103f;
padding:10px;
border-radius:12px;
margin-top:8px;
font-size:13px;
}

.premium-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.popup-box{
background:#120022;
padding:25px;
border-radius:25px;
max-width:400px;
width:100%;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

.popup-box h2{
color:#ff2e78;
margin-bottom:15px;
}

.popup-box p{
line-height:1.9;
font-size:15px;
}

.telegram-btn{
display:block;
margin-top:20px;
padding:15px;
border-radius:15px;
background:#229ED9;
color:white;
text-decoration:none;
font-weight:700;
}

.close-btn{
margin-top:15px;
padding:12px;
background:#ff2e78;
border-radius:15px;
cursor:pointer;
font-weight:700;
}

footer{
padding:30px;
text-align:center;
color:#999;
}

.loader{
display:none;
margin:auto;
border:5px solid #222;
border-top:5px solid #ff2e78;
width:50px;
height:50px;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>
<body>

<header>

<div class="logo">
<img src="https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg">
HABESHA <span>PREMIUM</span>
</div>

<div class="top-buttons">
<button class="vip-btn" onclick="openPremium()">🔥 VIP</button>
<button onclick="toggleAdmin()">ADMIN</button>
</div>

</header>

<div class="categories">
<button class="cat-btn">🔥 XXX 🍑</button>
<button class="cat-btn" onclick="openPremium()">💍 PREMIUM 💎</button>
</div>

<div style="display:flex;justify-content:center;padding:15px;">

<script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>

<ins class="eas6a97888e2" data-zoneid="5927772"></ins>

<script>
(AdProvider = window.AdProvider || []).push({"serve": {}});
</script>

</div>

<div class="search-box">
<input type="text" id="search" placeholder="ፈልግ...">
</div>

<h2>አዲስ ቪዲዮ ጫን</h2>

UPLOAD VIDEO

<div class="popup-box">

<h2>💍 PREMIUM VIP 💎</h2>

<p>

ሰላም እንኳን ወደ premium (VIP)
በሰላም መጣህ<br><br>

የ1 ወር vip video 500 ብር<br>
የ3 ወር vip video 1200 ብር<br>

የ1 አመት vip video 4000 ብር

</p>

<a class="telegram-btn"
href="https://t.me/Habeshapremiumvideo"
target="_blank">

ለመክፈል Telegram ግባ

</a>

<div class="close-btn" onclick="closePremium()">
ዝጋ
</div>

</div>

</div>

<footer>
© 2026 HABESHA PREMIUM
</footer>

<script>

const firebaseConfig = {

databaseURL:
"https://habesha-xxx-video-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();

const grid = document.getElementById('videoGrid');

const loader = document.getElementById('loader');

const uploadBtn = document.getElementById('uploadBtn');

let allVideos = [];

function toggleAdmin(){

const panel = document.getElementById('adminPanel');

panel.style.display =
panel.style.display === 'block'
? 'none'
: 'block';

}

function openPremium(){
document.getElementById('premiumPopup').style.display='flex';
}

function closePremium(){
document.getElementById('premiumPopup').style.display='none';
}

uploadBtn.addEventListener('click',()=>{

const title =
document.getElementById('video-title').value;

const url =
document.getElementById('video-url').value;

const pass =
document.getElementById('admin-pass').value;

if(pass !== "dawit12345"){

alert("Wrong Password");

return;

}

if(!title || !url){

alert("Fill all fields");

return;

}

uploadBtn.innerText="Uploading...";

const newVideoRef =
database.ref('videos').push();

newVideoRef.set({

title:title,
url:url,
views:0,
likes:0,
watching:Math.floor(Math.random()*50)+1,
timestamp:Date.now()

})

.then(()=>{

alert("Video Uploaded Successfully");

document.getElementById('video-title').value='';

document.getElementById('video-url').value='';

document.getElementById('admin-pass').value='';

uploadBtn.innerText="UPLOAD VIDEO";

})

.catch((error)=>{

alert(error.message);

uploadBtn.innerText="UPLOAD VIDEO";

});

});

function loadVideos(){

loader.style.display='block';

database.ref('videos').on('value',(snapshot)=>{

grid.innerHTML='';

allVideos=[];

loader.style.display='none';

const data = snapshot.val();

if(data){

for(let key in data){

allVideos.push({

id:key,
...data[key]

});

}

displayVideos(allVideos.reverse());

}

});

}

function displayVideos(videos){

grid.innerHTML='';

videos.forEach(video=>{

const card = document.createElement('div');

card.className='card';

card.innerHTML=`

<div class="badge">PREMIUM</div>

<div class="watch">
🔴 ${video.watching || 1}
</div>

<video controls
poster="https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg">

<source src="${video.url}" type="video/mp4">

</video>

<div class="info">

<div class="title">
${video.title}
</div>

<div class="actions">

<div class="action">
👁 ${video.views || 0}
</div>

<div class="action"
onclick="likeVideo('${video.id}')">

❤️ ${video.likes || 0}

</div>

<div class="action"
onclick="shareVideo('${video.url}')">

🔗 SHARE

</div>

</div>

<div class="action"
style="margin-top:10px"
onclick="toggleComments('${video.id}')">

💬 COMMENTS

</div>

<div class="comments"
id="comments-${video.id}">

<div id="list-${video.id}"></div>

<input type="text"
id="input-${video.id}"
placeholder="comment...">

<div class="send-comment"
onclick="addComment('${video.id}')">

SEND

</div>

</div>

</div>

`;

grid.appendChild(card);

const vid = card.querySelector('video');

vid.addEventListener('play',()=>{

database.ref('videos/'+video.id+'/views')
.transaction(v=>(v||0)+1);

},{once:true});

});

}

function shareVideo(url){

navigator.clipboard.writeText(url);

alert("Link Copied");

}

function likeVideo(id){

database.ref('videos/'+id+'/likes')
.transaction(l=>(l||0)+1);

}

function toggleComments(id){

const box =
document.getElementById(`comments-${id}`);

if(box.style.display==='block'){

box.style.display='none';

}else{

box.style.display='block';

loadComments(id);

}

}

function loadComments(id){

database.ref('comments/'+id)
.on('value',(snapshot)=>{

const list =
document.getElementById(`list-${id}`);

list.innerHTML='';

const data=snapshot.val();

if(data){

for(let key in data){

list.innerHTML += `

<div class="comment">

${data[key].text}

</div>

`;

}

}

});

}

function addComment(id){

const input =
document.getElementById(`input-${id}`);

const text = input.value.trim();

if(!text)return;

database.ref('comments/'+id)
.push({

text:text,
time:Date.now()

});

input.value='';

}

document.getElementById('search')
.addEventListener('input',(e)=>{

const value =
e.target.value.toLowerCase();

const filtered =
allVideos.filter(v=>
v.title.toLowerCase().includes(value)
);

displayVideos(filtered);

});

loadVideos();

</script>

</body>
</html>
