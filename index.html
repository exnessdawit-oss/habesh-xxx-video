<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HABESHA PREMIUM</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#8b5cf6;
    --dark:#070b14;
    --card:#111827;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
    135deg,
    #070b14,
    #111827,
    #1e293b);

    color:white;
}

/* HEADER */

header{
    background:rgba(10,15,25,0.9);

    padding:15px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    position:sticky;
    top:0;
    z-index:100;

    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;

    font-size:20px;
    font-weight:700;
}

.logo span{
    color:#8b5cf6;
}

.site-logo{
    width:45px;
    height:45px;

    border-radius:50%;

    object-fit:cover;

    border:2px solid #8b5cf6;
}

.top-buttons{
    display:flex;
    gap:8px;
}

button{
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.login-btn,
.search-btn{
    background:#1f2937;

    color:white;

    padding:10px 14px;

    border-radius:10px;

    font-size:13px;
}

/* SEARCH */

.search-box{
    padding:15px;
}

.search-box input{
    width:100%;

    padding:13px;

    border:none;

    border-radius:12px;

    background:#111827;

    color:white;
}

/* ADMIN */

.admin-section{
    background:#111827;

    margin:15px;

    padding:15px;

    border-radius:15px;

    display:none;
}

.admin-section h3{
    margin-bottom:12px;
    color:#8b5cf6;
}

input{
    width:100%;

    padding:12px;

    margin:8px 0;

    border:none;

    border-radius:10px;

    background:#1f2937;

    color:white;
}

.upload-btn{
    width:100%;

    padding:12px;

    border-radius:10px;

    background:#8b5cf6;

    color:white;

    font-weight:bold;
}

/* GRID */

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(240px,1fr));

    gap:15px;

    padding:15px;
}

/* VIDEO CARD */

.video-card{
    background:#111827;

    border-radius:16px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.06);

    transition:0.3s;
}

.video-card:hover{
    transform:translateY(-5px);
}

video{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

.video-info{
    padding:12px;
}

.video-title{
    font-size:14px;
    font-weight:600;

    margin-bottom:8px;
}

/* BADGE */

.badge{
    display:inline-block;

    background:#8b5cf6;

    color:white;

    padding:4px 10px;

    border-radius:20px;

    font-size:10px;

    font-weight:bold;
}

/* DELETE */

.del-btn{
    position:absolute;

    top:8px;
    right:8px;

    background:red;

    color:white;

    padding:6px 10px;

    border-radius:8px;

    font-size:11px;
}

/* ACTIONS */

.video-actions{
    display:flex;

    gap:6px;

    margin-top:10px;
}

.action-btn{
    flex:1;

    padding:8px;

    background:#1f2937;

    color:white;

    border-radius:10px;

    font-size:11px;
}

.download-btn{
    background:#22c55e;
    color:black;
}

/* VIEWS */

.views{
    margin-top:8px;

    font-size:11px;

    color:#9ca3af;
}

/* COMMENT */

.comment-box{
    margin-top:10px;
}

.comment-box input{

    height:35px;

    padding:6px 10px;

    font-size:12px;

    border-radius:8px;
}

.comment-btn{

    width:100%;

    margin-top:6px;

    padding:8px;

    font-size:12px;

    border-radius:8px;

    background:#8b5cf6;

    color:white;
}

.comments-container{
    display:none;

    margin-top:8px;
}

.comment-item{

    background:#1f2937;

    padding:6px 8px;

    font-size:11px;

    border-radius:8px;

    margin-top:5px;
}

.show-comments-btn{

    width:100%;

    margin-top:6px;

    padding:7px;

    border-radius:8px;

    background:#374151;

    color:white;

    font-size:11px;
}

/* FOOTER */

footer{
    text-align:center;

    padding:25px;

    margin-top:20px;

    color:#94a3b8;

    font-size:12px;
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:10px;
    }

    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>

    <div class="logo">

        <img
        src="1000019134.jpg"
        class="site-logo">

        HABESHA <span>PREMIUM</span>

    </div>

    <div class="top-buttons">

        <button class="search-btn">
            🔍 Search
        </button>

        <button
        class="login-btn"
        onclick="adminLogin()">

            Admin Login

        </button>

    </div>

</header>

<!-- SEARCH -->

<div class="search-box">

    <input
    type="text"
    id="searchInput"
    placeholder="ቪዲዮ ፈልግ..."
    onkeyup="searchVideos()">

</div>

<!-- ADMIN -->

<div id="adminPanel" class="admin-section">

    <h3>🎬 Upload Video</h3>

    <input
    type="text"
    id="vTitle"
    placeholder="Video Title">

    <input
    type="text"
    id="vThumb"
    placeholder="Thumbnail Link">

    <input
    type="text"
    id="vUrl"
    placeholder="Video URL">

    <button
    class="upload-btn"
    onclick="addVideo()">

        ➕ Upload Video

    </button>

</div>

<!-- VIDEOS -->

<div class="grid" id="videoGrid"></div>

<footer>
    © 2026 HABESHA PREMIUM
</footer>

<script>

/* FIREBASE */

const firebaseConfig = {
databaseURL:"https://habesha-xxx-video-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ADMIN */

let isAdmin = false;

const MY_PASSWORD = "1234";

/* LOGIN */

function adminLogin(){

const pass = prompt("Enter Admin Password");

if(pass === MY_PASSWORD){

isAdmin = true;

document.getElementById("adminPanel")
.style.display = "block";

renderVideos();

alert("Welcome Admin!");

}else{

alert("Wrong Password!");
}
}

/* ADD VIDEO */

function addVideo(){

if(!isAdmin){
return alert("Login First!");
}

const title =
document.getElementById("vTitle").value;

const thumb =
document.getElementById("vThumb").value;

let url =
document.getElementById("vUrl").value;

if(url.includes("dropbox.com")){
url = url.replace("dl=0","raw=1");
}

if(title && thumb && url){

db.ref("videos").push({

title:title,
thumbnail:thumb,
videoUrl:url,
createdAt:Date.now()

})

.then(()=>{

alert("Uploaded!");

document.getElementById("vTitle").value = "";
document.getElementById("vThumb").value = "";
document.getElementById("vUrl").value = "";

});
}
}

/* DELETE */

function deleteVideo(id){

if(confirm("Delete Video?")){

db.ref("videos/" + id).remove();
}
}

/* SEARCH */

function searchVideos(){

const value =
document.getElementById("searchInput")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".video-card");

cards.forEach(card=>{

const title =
card.querySelector(".video-title")
.innerText
.toLowerCase();

if(title.includes(value)){

card.style.display = "block";

}else{

card.style.display = "none";
}
});
}

/* LIKE */

function likeVideo(id){

const likeRef =
db.ref("likes/" + id);

likeRef.transaction((likes)=>{

return (likes || 0) + 1;
});
}

function loadLikes(id){

db.ref("likes/" + id)
.on("value",(snap)=>{

document.getElementById(
"like-" + id)
.innerText =
snap.val() || 0;

});
}

/* COMMENTS */

function addComment(videoId){

const input =
document.getElementById(
"commentInput-" + videoId);

const text = input.value;

if(text.trim() === "") return;

db.ref("comments/" + videoId)
.push({

text:text

});

input.value = "";
}

/* SHOW COMMENTS */

function toggleComments(id){

const box =
document.getElementById(
"comments-" + id);

if(box.style.display === "block"){

box.style.display = "none";

}else{

box.style.display = "block";
}
}

function loadComments(videoId){

db.ref("comments/" + videoId)
.on("value",(snapshot)=>{

const container =
document.getElementById(
"comments-" + videoId);

container.innerHTML = "";

snapshot.forEach((child)=>{

const data = child.val();

container.innerHTML += `

<div class="comment-item">
💬 ${data.text}
</div>

`;

});
});
}

/* RENDER */

function renderVideos(){

db.ref("videos")
.on("value",(snapshot)=>{

const grid =
document.getElementById("videoGrid");

grid.innerHTML = "";

snapshot.forEach((child)=>{

const data = child.val();

const key = child.key;

grid.innerHTML += `

<div class="video-card">

${isAdmin ? `
<button
class="del-btn"
onclick="deleteVideo('${key}')">
Delete
</button>
` : ''}

<video
controls
preload="none"
poster="${data.thumbnail}">

<source
src="${data.videoUrl}"
type="video/mp4">

</video>

<div class="video-info">

<div class="video-title">
${data.title}
</div>

<span class="badge">
PREMIUM
</span>

<div class="video-actions">

<button
onclick="likeVideo('${key}')"
class="action-btn">

❤️
<span id="like-${key}">
0
</span>

</button>

<button
onclick="window.open('${data.videoUrl}')"
class="action-btn download-btn">

📥 Download

</button>

</div>

<div class="comment-box">

<input
type="text"
id="commentInput-${key}"
placeholder="Comment...">

<button
class="comment-btn"
onclick="addComment('${key}')">

💬 Comment

</button>

<button
class="show-comments-btn"
onclick="toggleComments('${key}')">

📄 Show Comments

</button>

<div
class="comments-container"
id="comments-${key}">
</div>

</div>

</div>

</div>

`;

setTimeout(()=>{

loadLikes(key);

loadComments(key);

},300);

});

});
}

/* START */

renderVideos();

</script>

</body>
</html>
