<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="6a97888e-site-verification" content="33cfab89caddf6484a68db664b8a49de">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABESHA PREMIUM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f0c20, #150e2a, #110721); color: white; min-height: 100vh; }
        .light { background: #f4f4f8; color: #111; }
        .light header, .light .video-card, .light .admin-section, .light input, .light .search-box input { background: white; color: #111; }
        header { background: #110d26; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
        .logo span { color: var(--primary); }
        .logo img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .buttons { display: flex; gap: 10px; }
        .top-buttons input { display: none; gap: 5px; }
        button { border: none; cursor: pointer; transition: 0.3s; }
        .theme-btn, .search-btn, .admin-btn { background: #231b42; color: white; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
        .theme-btn { background: #ff256b; color: black; font-weight: bold; }
        .search-box { padding: 12px; }
        .search-box input { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #110d27; color: white; font-size: 14px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        .admin-section { background: #110d27; margin: 15px; padding: 15px; border-radius: 15px; display: none; }
        .admin-section h3 { margin-bottom: 12px; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; background: #1a1337; color: white; font-weight: 600; }
        #upload-btn { width: 100%; padding: 12px; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 15px rgba(255,51,102,0.4); }
        .loader { width: 40px; height: 40px; border: 4px solid #fff; border-top: 4px solid #f05c5c; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; padding: 15px; }
        .video-card { background: #110d27; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .video-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 25px rgba(100,20,240,0.4); }
        .trending { position: absolute; top: 8px; left: 8px; background: #ee4266; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        video { width: 100%; aspect-ratio: 16/9; background: black; }
        .video-info { padding: 12px; }
        .video-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .preview-badge { display: inline-block; background: var(--primary); color: white; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .watching { position: absolute; top: 8px; right: 8px; background: red; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; z-index: 10; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .video-actions { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; background: #1a1337; color: white; border-radius: 10px; font-size: 11px; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .action-btn.views { background: #231b42; color: #aaa; cursor: default; }
        .views { margin-top: 10px; color: #8a81a6; font-size: 11px; }
        .comments { margin-top: 8px; }
        .comment-input { margin-top: 8px; }
        .comment-input input { height: 35px; padding: 0 10px; font-size: 12px; }
        .comment-box { width: 100%; margin-top: 6px; padding: 8px; background: var(--primary); color: white; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .show-comments-btn { width: 100%; margin-top: 10px; padding: 5px; border-radius: 6px; background: #1a1337; color: #8a81a6; font-size: 11px; font-weight: 600; text-align: center; cursor: pointer; }
        .comments-container { display: none; margin-top: 8px; }
        .comment { background: #1a1337; padding: 8px; border-radius: 8px; margin-top: 6px; font-size: 11px; color: #ccc; border-left: 3px solid var(--primary); }
        footer { text-align: center; padding: 25px; color: #8a81a6; font-size: 12px; }
        @media (max-width: 768px) { header { flex-direction: column; gap: 10px; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.ibb.co/5R4bcJz/IMG-20260312-113744-302.jpg" class="site-logo" alt="site logo">
            HABESHA <span>PREMIUM</span>
        </div>
        <div class="buttons">
            <button class="theme-btn" id="theme-toggle">Theme</button>
            <button class="admin-btn" id="admin-toggle">Admin Login</button>
        </div>
    </header>

    <div style="display: flex; justify-content: center; align-items: center; margin: 15px auto; padding: 10px; width: 100%; max-width: 320px; overflow: hidden;">
        <script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script> 
        <ins class="eas6a97888e2" data-zoneid="5927772"></ins> 
        <script>(AdProvider = window.AdProvider || []).push({"serve": {}});</script>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="ፈልግ...">
    </div>

    <div class="admin-section" id="admin-panel">
        <h3>አዲስ ቪዲዮ መጫኛ</h3>
        <input type="text" id="video-title" placeholder="የቪዲዮው ርዕስ">
        <input type="text" id="video-url" placeholder="የቪዲዮው ሊንክ (Direct MP4 URL)">
        <input type="password" id="admin-pass" placeholder="የአድሚን ፓስወርድ">
        <button id="upload-btn">ቪዲዮውን ጫን</button>
    </div>

    <div class="loader" id="main-loader"></div>
    <div class="grid" id="video-grid"></div>

    <footer>
        &copy; 2026 HABESHA PREMIUM. All Rights Reserved.
    </footer>

    <script>
        const firebaseConfig = {
            databaseURL: "https://habesh-xxx-video-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const videoGrid = document.getElementById('video-grid');
        const mainLoader = document.getElementById('main-loader');
        const adminToggle = document.getElementById('admin-toggle');
        const adminPanel = document.getElementById('admin-panel');
        const uploadBtn = document.getElementById('upload-btn');
        const searchInput = document.getElementById('search-input');
        const themeToggle = document.getElementById('theme-toggle');

        let allVideos = [];

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
        });

        adminToggle.addEventListener('click', () => {
            adminPanel.style.display = adminPanel.style.display === 'block' ? 'none' : 'block';
        });

        uploadBtn.addEventListener('click', () => {
            const title = document.getElementById('video-title').value;
            const url = document.getElementById('video-url').value;
            const pass = document.getElementById('admin-pass').value;

            if(pass !== "dawit123") {
                alert("የተሳሳተ ፓስወርድ ነው!");
                return;
            }
            if(!title || !url) {
                alert("እባክዎ ሁሉንም ቦታዎች ይሙሉ!");
                return;
            }

            const newVideoRef = database.ref('videos').push();
            newVideoRef.set({
                title: title,
                url: url,
                views: 0,
                watching: Math.floor(Math.random() * 40) + 10
            }).then(() => {
                alert("ቪዲዮው በትክክል ተጭኗል!");
                adminPanel.style.display = 'none';
                document.getElementById('video-title').value = '';
                document.getElementById('video-url').value = '';
            });
        });

        function loadVideos() {
            mainLoader.style.display = 'block';
            database.ref('videos').on('value', (snapshot) => {
                videoGrid.innerHTML = '';
                allVideos = [];
                const data = snapshot.val();
                mainLoader.style.display = 'none';

                if(data) {
                    for(let key in data) {
                        allVideos.push({id: key, ...data[key]});
                    }
                    displayVideos(allVideos);
                }
            });
        }

        function displayVideos(videos) {
            videoGrid.innerHTML = '';
            videos.reverse().forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="trending">PREMIUM</div>
                    <div class="watching">🔴 ${video.watching || Math.floor(Math.random() * 40) + 10} ማየት ላይ</div>
                    <video controls preload="none" poster="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500">
                        <source src="${video.url}" type="video/mp4">
                    </video>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-actions">
                            <div class="action-btn views">👁️ ${video.views || 0} እይታዎች</div>
                            <div class="action-btn" onclick="shareVideo('${video.id}')">🔗 ሊንክ ቅዳ</div>
                        </div>
                        <div class="show-comments-btn" onclick="toggleComments('${video.id}')">አስተያየቶች</div>
                        <div class="comments-container" id="comments-${video.id}">
                            <div class="comments-list" id="list-${video.id}"></div>
                            <div class="comment-input">
                                <input type="text" id="input-${video.id}" placeholder="አስተያየት ይጻፉ...">
                                <div class="comment-box" onclick="addComment('${video.id}')">ላክ</div>
                            </div>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);
                
                const videoElement = card.querySelector('video');
                videoElement.addEventListener('play', () => {
                    database.ref('videos/' + video.id + '/views').transaction((currentViews) => {
                        return (currentViews || 0) + 1;
                    });
                }, { once: true });
            });
        }

        window.shareVideo = function(id) {
            const shareUrl = window.location.origin + '?v=' + id;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("የቪዲዮው ሊንክ ተገልብጧል!");
            });
        }

        window.toggleComments = function(id) {
            const container = document.getElementById(`comments-${id}`);
            if(container.style.display === 'block') {
                container.style.display = 'none';
            } else {
                container.style.display = 'block';
                loadComments(id);
            }
        }

        function loadComments(id) {
            const list = document.getElementById(`list-${id}`);
            database.ref(`comments/${id}`).on('value', (snapshot) => {
                list.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    for(let key in data) {
                        const div = document.createElement('div');
                        div.className = 'comment';
                        div.innerText = data[key].text;
                        list.appendChild(div);
                    }
                } else {
                    list.innerHTML = '<div style="font-size:11px;color:#aaa;padding:5px;">የመጀመሪያውን አስተያየት ይጻፉ!</div>';
                }
            });
        }

        window.addComment = function(id) {
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            if(!text) return;

            database.ref(`comments/${id}`).push({
                text: text,
                timestamp: Date.now()
            }).then(() => {
                input.value = '';
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allVideos.filter(video => video.title.toLowerCase().includes(query));
            displayVideos(filtered);
        });

        window.onload = function() {
            loadVideos();
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            if(videoId) {
                setTimeout(() => {
                    const targetCommentBox = document.getElementById(`comments-${videoId}`);
                    if(targetCommentBox) {
                        targetCommentBox.scrollIntoView({ behavior: 'smooth' });
                        toggleComments(videoId);
                    }
                }, 1500);
            }
        }
    </script>
</body>
</html>
