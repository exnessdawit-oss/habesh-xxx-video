<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habesha XXX Video</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa0AlJrexC9S-YuA-seeUt_oO0ZOhMRwc",
            authDomain: "habesha-xxx-video.firebaseapp.com",
            projectId: "habesha-xxx-video",
            storageBucket: "habesha-xxx-video.firebasestorage.app",
            messagingSenderId: "841201015331",
            appId: "1:841201015331:web:08594d00eb793f6eaf2f96"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vidsCol = collection(db, "videos");

        window.addVideo = async function() {
            const title = document.getElementById('vTitle').value;
            const url = document.getElementById('vUrl').value;
            const dur = parseInt(document.getElementById('vDur').value);
            if(!title || !url || !dur) return alert("ሁሉንም ሙላ!");
            await addDoc(vidsCol, { title, url, duration: dur, createdAt: Date.now() });
            alert("✅ ተጨምሯል!");
            document.getElementById('vTitle').value = ''; document.getElementById('vUrl').value = '';
        };

        const q = query(vidsCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            snapshot.forEach(d => {
                const v = d.data();
                grid.innerHTML += `<div class="card"><div class="thumb" onclick="playV('${v.url}', '${v.title}')">🎬</div>
                <div class="info"><h4>${v.title}</h4><button class="play-btn" onclick="playV('${v.url}', '${v.title}')">▶ አጫውት</button></div></div>`;
            });
        });

        window.playV = (url, title) => {
            document.getElementById('player').style.display = 'block';
            const v = document.getElementById('mainV');
            v.src = url; v.play();
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: white; padding: 15px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { background: #1e293b; border-radius: 8px; padding: 10px; text-align: center; }
        .thumb { font-size: 40px; cursor: pointer; background: #334155; padding: 20px; border-radius: 5px; }
        .play-btn { background: #2563eb; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; margin-top: 5px; }
        #player { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; }
        video { width: 100%; height: 80%; }
        .admin { margin-top: 30px; background: #1e293b; padding: 15px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>Habesha XXX Video</h2>
    <div class="video-grid" id="videoGrid"></div>
    <div class="admin">
        <input type="text" id="vTitle" placeholder="የርዕስ ስም">
        <input type="text" id="vUrl" placeholder="የቪዲዮ ሊንክ (MP4)">
        <input type="number" id="vDur" placeholder="ርዝመት በሰከንድ">
        <button class="play-btn" onclick="addVideo()">ቪዲዮ አክል</button>
    </div>
    <div id="player">
        <button onclick="document.getElementById('player').style.display='none'; document.getElementById('mainV').pause();" style="color:red; font-size:20px; padding:10px;">X ዝጋ</button>
        <video id="mainV" controls></video>
    </div>
</body>
</html>
