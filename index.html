<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070012;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#12001f;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #2a0045;
flex-wrap:wrap;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
}

.logo h1{
font-size:24px;
background:linear-gradient(to right,#fff,#ff0066);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:12px 16px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0066,#ff7700);
color:white;
font-weight:bold;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* LOADER */

.loader{
position:fixed;
inset:0;
background:#05000f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

.loader img{
width:120px;
height:120px;
border-radius:50%;
animation:spin 2s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* ONLINE */

.counter{
padding:10px 15px;
font-size:15px;
color:#00ff99;
}

/* TITLE */

.trending-title{
padding:10px 15px;
font-size:22px;
font-weight:bold;
color:#ff3d88;
}

/* ADS */

.ads-box{
display:flex;
justify-content:center;
align-items:center;
padding:10px;
margin-bottom:10px;
}

/* VIDEOS */

.video-container{
padding:15px;
display:grid;
gap:25px;
}

.video-card{
background:#140022;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,0,100,.2);
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.video-thumb{
position:relative;
}

.video-thumb video{
width:100%;
height:260px;
object-fit:cover;
background:black;
}

.premium-badge{
position:absolute;
top:10px;
left:10px;
background:#ff2f7d;
padding:8px 14px;
border-radius:12px;
font-size:14px;
font-weight:bold;
z-index:10;
}

.views-badge{
position:absolute;
top:10px;
right:10px;
background:red;
padding:8px 12px;
border-radius:12px;
font-weight:bold;
}

.video-info{
padding:15px;
}

.video-title{
font-size:20px;
margin-bottom:15px;
font-weight:bold;
line-height:1.4;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.action-btn{
background:#250040;
padding:14px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.action-btn:hover{
background:#3b0061;
}

.comments-btn{
margin-top:10px;
background:#250040;
padding:14px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.comments-btn:hover{
background:#3b0061;
}

/* FLOAT */

.telegram-float{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
border-radius:50%;
background:#0088cc;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
text-decoration:none;
color:white;
z-index:9999;
box-shadow:0 0 20px rgba(0,136,204,.5);
}

/* VIP */

.vip-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.vip-box{
background:#13001f;
padding:25px;
border-radius:25px;
width:100%;
max-width:500px;
line-height:2;
}

.vip-box h2{
color:#ff2f7d;
margin-bottom:15px;
}

.vip-box a{
display:block;
margin-top:20px;
background:#0088cc;
padding:15px;
text-align:center;
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* ADMIN */

.admin-panel{
padding:15px;
display:none;
}

.admin-box{
background:#13001f;
padding:20px;
border-radius:20px;
}

.admin-box input,
.admin-box select{
width:100%;
padding:18px;
margin-top:12px;
background:#24003d;
border:none;
color:white;
border-radius:15px;
font-size:16px;
}

.upload-btn{
margin-top:15px;
width:100%;
padding:18px;
font-size:20px;
font-weight:bold;
background:#ff2f7d;
color:white;
border:none;
border-radius:18px;
cursor:pointer;
}

/* SKELETON */

.skeleton{
height:300px;
border-radius:20px;
background:linear-gradient(90deg,#150026,#260044,#150026);
background-size:200% 100%;
animation:skeleton 1.2s infinite;
}

@keyframes skeleton{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}

footer{
text-align:center;
padding:40px 20px;
color:#888;
}

</style>

<script>

const ADMIN_PASSWORD = "dawit12345";

let adminMode = false;

const defaultVideos = [

{
title:"Sample Video 🔥",
url:"https://www.w3schools.com/html/mov_bbb.mp4",
views:15,
likes:4,
poster:"https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg"
}

];

let videos =
JSON.parse(localStorage.getItem("videos"))
|| defaultVideos;

/* ADMIN */

function enableAdminMode(){

const pass = prompt("Enter Admin Password");

if(pass === ADMIN_PASSWORD){

adminMode = true;

alert("Admin Mode Enabled ✅");

document.getElementById("adminPanel").style.display = "block";

window.scrollTo(0,0);

}else{

alert("Wrong Password ❌");

}

}

/* LOADER */

setTimeout(()=>{

document.getElementById("loader").style.display = "none";

},2500);

/* VIP */

function openVIP(){

document.getElementById("vipPopup").style.display = "flex";

}

window.onclick = function(e){

if(e.target ==
document.getElementById("vipPopup")){

document.getElementById("vipPopup").style.display = "none";

}

}

/* UPLOAD */

function uploadVideo(){

const pass =
document.getElementById("adminPassword").value;

const title =
document.getElementById("videoTitle").value;

const url =
document.getElementById("videoUrl").value;

const poster =
document.getElementById("templateSelect").value;

if(pass !== ADMIN_PASSWORD){

alert('' saxam ❌");

return;

}

if(!title || !url){

alert("Fill all fields");

return;

}

let fixedUrl = url;

if(url.includes("dropbox.com")){

fixedUrl =
url.replace("dl=0","raw=1")
.replace("dl=1","raw=1");

}

videos.unshift({

title:title,
url:fixedUrl,
views:1,
likes:0,
poster:poster

});

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

alert("Upload Success ✅");

renderVideos();

}

/* RENDER */

function renderVideos(){

const container =
document.getElementById("videos");

container.innerHTML = "";

videos.sort((a,b)=>b.views-a.views);

videos.forEach((video,index)=>{

const card =
document.createElement("div");

card.className = "video-card";

card.innerHTML = `

<div class="video-thumb">

<div class="premium-badge">
PREMIUM
</div>

<div class="views-badge">
👁 ${video.views}
</div>

<video
controls
controlsList="nodownload"
poster="${video.poster}">

<source src="${video.url}" type="video/mp4">

</video>

</div>

<div class="video-info">

<div class="video-title">
${video.title}
</div>

<div class="actions">

<div class="action-btn">
👁 ${video.views}
</div>

<div class="action-btn"
onclick="likeVideo(${index})">

❤️ $(video.likes)

</div>

<div class="action-btn"
onclick="shareVideo('$(video.url)')">

🔗 SHARE

</div>

</div>

<div class="comments-btn"
onclick="favoriteVideo(${index})">

⭐ SAVE FAVORITE

</div>

<div class="comments-btn"
onclick="editTitle(${index})">

✏ EDIT TITLE

</div>

<div class="comments-btn"
onclick="deleteVideo(${index})">

🗑 DELETE VIDEO

</div>

</div>

`;

container.appendChild(card);

const vid =
card.querySelector("video");

vid.addEventListener("play",()=>{

video.views++;

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

});

vid.addEventListener("dblclick",()=>{

likeVideo(index);

});

});

}

/* LIKE */

function likeVideo(i){

let likedVideos =
JSON.parse(localStorage.getItem("likedVideos"))
|| {};

if(!adminMode){

if(likedVideos[i] >= 1){

alert("Maximum likes reached ❤️");

return;

}

likedVideos[i] =
(likedVideos[i] || 0) + 1;

localStorage.setItem(
"likedVideos",
JSON.stringify(likedVideos)
);

}

videos[i].likes++;

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

renderVideos();

}

/* SHARE */

function shareVideo(url){

window.open(
`https://t.me/share/url?url=${url}`,
'_blank'
);

}

/* FAVORITE */

function favoriteVideo(i){

let favs =
JSON.parse(localStorage.getItem("favorites"))
|| [];

favs.push(videos[i]);

localStorage.setItem(
"favorites",
JSON.stringify(favs)
);

alert("Saved to favorites ⭐");

}

/* DELETE */

function deleteVideo(i){

const pass = prompt("Admin Password");

if(pass !== ADMIN_PASSWORD){

alert("saxasm❌");

return;

}

videos.splice(i,1);

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

renderVideos();

}

/* EDIT */

function editTitle(i){

const pass = prompt("Admin Password");

if(pass !== ADMIN_PASSWORD){

alert("Wrong Password ❌");

return;

}

const newTitle = prompt("New Title");

if(newTitle){

videos[i].title = newTitle;

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

renderVideos();

}

}

/* XXX */

function showXXX(){

window.scrollTo({
top:500,
behavior:'smooth'
});

}

/* ONLINE */

setInterval(()=>{

const num =
Math.floor(Math.random()*500)+100;

document.getElementById("onlineCounter")
.innerText =
`${num} users online`;

},4000);

/* START */

renderVideos();

/* BLOCK */

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

</script>
