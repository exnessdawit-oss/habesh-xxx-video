<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <style>
        body { 
            /* የጫንከው ፎቶ ስም */
            background-image: url('IMG_20260514_012150_661.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .video-card { 
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
        }

        video { width: 100%; display: block; background: #000; height: 200px; }
        h3 { font-size: 16px; padding: 15px; margin: 0; color: #fff; text-align: center; }
        h2 { color: #ffffff; text-align: center; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <h2>የቪዲዮ ማዕከል</h2>
    <div class="gallery" id="videoGallery"></div>

    <script>
        const AdController = window.Adsgram.init({ blockId: "30165" });

        const videos = [
            { 
                title: "አዲሱ ቪዲዮ", 
                /* አጣፈጣት ቤተሰብ   */
                url:_"IMG_20260514_012019_644.mp4", 
                poster:_"IMG_20260514_012150_661.jpg" 
            }
        ];

        const gallery = document.getElementById('videoGallery');

        videos.forEach((vid, index) => {
            let card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = 
                <video id="vid-${index}" poster="${vid.poster}" controls playsinline>
                    <source src="${vid.url}" type="video/mp4">
                </video>
                <h3>${vid.title}</h3>
            ;
            gallery.appendChild(card);

            let vElement = document.getElementById(vid-${index});
            let watchedPoints = new Set();

            vElement.onplay = () => {
                let duration = vElement.duration / 60;
                if (duration > 8 && !watchedPoints.has('start')) {
                    showAd(vElement, 'start', watchedPoints);
                }
            };

            vElement.ontimeupdate = () => {
                let duration = vElement.duration / 60;
                let currentTime = vElement.currentTime;
                let progress = (currentTime / vElement.duration) * 100;

                if (duration >= 0.5 && duration <= 2) {
                    if (progress > 1 && !watchedPoints.has('30s-2m-start')) showAd(vElement, '30s-2m-start', watchedPoints);
                }
                else if (duration > 2 && duration <= 8) {
                    if (progress >= 15 && !watchedPoints.has('mid-15')) showAd(vElement, 'mid-15', watchedPoints);
                    if (progress >= 50 && !watchedPoints.has('mid-50')) showAd(vElement, 'mid-50', watchedPoints);
                }
                else if (duration > 8 && duration <= 30) {
                    if (progress >= 25 && !watchedPoints.has('long-25')) showAd(vElement, 'long-25', watchedPoints);
                  if (progress >= 50 && !watchedPoints.has('long-50')) showAd(vElement, 'long-50', watchedPoints);
                    if (progress >= 75 && !watchedPoints.has('long-75')) showAd(vElement, 'long-75', watchedPoints);
                }
            };

            vElement.onended = () => {
                let duration = vElement.duration / 60;
                if (duration > 2) showAd(vElement, 'ended', watchedPoints);
            };
        });

        function showAd(video, point, set) {
            if (set.has(point)) return;
            video.pause();
            AdController.show().then(() => {
                set.add(point);
                video.play();
            }).catch(() => {
                set.add(point);
                video.play();
            });
        }
    </script>
</body>
</html>
