<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="6a97888e-site-verification" content="33cfab89caddf6484a68db664b8a49de">
    
    <title>HABESHA PREMIUM</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #ff4757; --bg-dark: #0a0a0a; --card-bg: #1a1a1a; --text: #f1f2f6; }
        body { font-family: sans-serif; background-image: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); color: var(--text); margin: 0; padding: 0; }
        header { background: var(--card-bg); padding: 15px; border-bottom: 2px solid var(--primary); text-align: center; }
        .admin-section { background: var(--card-bg); padding: 20px; margin: 20px; border-radius: 10px; border: 1px solid #333; display: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .video-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #333; transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 71, 87, 0.9); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .login-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; margin: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 24px;">HABESHA <span style="color: var(--primary);">PREMIUM</span></div>
    <button class="login-btn" onclick="adminLogin()">Admin Login</button>
</header>

<div id="adminPanel" class="admin-section">
    <h3 style="color: var(--primary); margin-top: 0;">ቪዲዮ መጫኛ ክፍል</h3>
    <input type="text" id="vTitle" placeholder="የቪዲዮው ስም">
    <input type="text" id="vThumb" placeholder="የፎቶ ሊንክ (Thumbnail)">
    <input type="text" id="vUrl" placeholder="የቪዲዮ ሊንክ (URL)">
    <button style="background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;" onclick="addVideo()">ቪዲዮውን ጫን</button>
    <button onclick="adminLogout()" style="margin-top: 15px; background: none; color: #ff4757; border: none; cursor: pointer;">መውጫ (Logout)</button>
</div>

<div class="grid" id="videoGrid"></div>

<script>
    // Firebase ማገናኛ (ያለህበት በትክክል ገብቷል)
    const firebaseConfig = { databaseURL: "https://habesha-xxx-video-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    const MY_PASSWORD = "1234"; 

    function adminLogin() {
        const pass = prompt("የይለፍ ቃል ያስገቡ:");
        if (pass === MY_PASSWORD) {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
            renderVideos();
            alert("እንኳን ደህና መጡ!");
        } else {
            alert("የይለፍ ቃል ተሳስቷል!");
        }
    }

    function adminLogout() {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = 'none';
        renderVideos();
    }

    function addVideo() {
        if (!isAdmin) return alert("መጀመሪያ Login ያድርጉ!");
        const title = document.getElementById('vTitle').value;
        const thumb = document.getElementById('vThumb').value;
        let url = document.getElementById('vUrl').value;

        if (url.includes("dropbox.com")) url = url.replace("dl=0", "raw=1");

        if (title && thumb && url) {
            db.ref('videos').push({ title, thumbnail: thumb, videoUrl: url })
            .then(() => {
                alert("ተጭኗል!");
                document.getElementById('vTitle').value = '';
                document.getElementById('vThumb').value = '';
                document.getElementById('vUrl').value = '';
            });
        }
    }

    function deleteVideo(id) {
        if (!isAdmin) return;
        if (confirm("ይህ ቪዲዮ ይጥፋ?")) {
            db.ref('videos/' + id).remove()
            .then(() => alert("ጠፍቷል!"));
        }
    }

    function renderVideos() {
        db.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                grid.innerHTML += `
                    <div class="video-card">
                        ${isAdmin ? `<button class="del-btn" onclick="deleteVideo('${key}')">አጥፋ</button>` : ''}
                        <video controls poster="${data.thumbnail}">
                            <source src="${data.videoUrl}" type="video/mp4">
                        </video>
                        <div style="padding: 12px;">
                            <h4 style="margin: 0; font-size: 15px;">${data.title}</h4>
                        </div>
                    </div>`;
            });
        });
    }

    renderVideos();
</script>

</body>
</html>
