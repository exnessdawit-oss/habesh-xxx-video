<!-- SEARCH + FILTER -->

<div style="padding:15px">

<input
type="text"
id="searchInput"
placeholder="🔍 Search videos..."
style="
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#1d0033;
color:white;
font-size:16px;
margin-bottom:15px;
">

<div style="
display:flex;
gap:10px;
overflow:auto;
padding-bottom:10px;
">


</div>

</div>

<!-- INSTALL BANNER -->

<div id="installBanner" style="
display:none;
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#140022;
padding:18px;
border-radius:18px;
z-index:99999;
box-shadow:0 0 25px rgba(255,0,120,.5);
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
">

<div>
<h3 style="color:#ff2f7d">📲 Install App</h3>
<p style="font-size:14px;color:#ccc">
አሁን ጫን - Add to Home Screen
</p>
</div>

<button class="btn" id="installBtn">
INSTALL
</button>

</div>

</div>

<!-- STATS BUTTON -->

<button class="btn"
onclick="openStats()"
style="
position:fixed;
left:20px;
bottom:100px;
z-index:9999;
">
📊 STATS
</button>

<!-- STATS POPUP -->

<div class="vip-popup" id="statsPopup">

<div class="vip-box">

<h2>📊 ANALYTICS DASHBOARD</h2>

<div id="statsContent"></div>

<button class="btn"
onclick="closeStats()"
style="margin-top:20px;width:100%">
CLOSE
</button>

</div>

</div>

<!-- TOAST -->

<div id="toast" style="
position:fixed;
top:20px;
right:20px;
background:#ff0066;
padding:16px 22px;
border-radius:14px;
color:white;
font-weight:bold;
display:none;
z-index:999999;
box-shadow:0 0 20px rgba(255,0,100,.5);
">
Toast
</div>
