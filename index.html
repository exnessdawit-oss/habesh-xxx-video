<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070012;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#12001f;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #2a0045;
flex-wrap:wrap;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
}

.logo h1{
font-size:24px;
background:linear-gradient(to right,#fff,#ff0066);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:12px 16px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0066,#ff7700);
color:white;
font-weight:bold;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SEARCH */

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#1b0030;
color:white;
font-size:16px;
}

/* LOADER */

.loader{
position:fixed;
inset:0;
background:#05000f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

.loader img{
width:120px;
height:120px;
border-radius:50%;
animation:spin 2s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* INSTALL */

.install-banner{
display:none;
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#12001f;
padding:18px;
border-radius:18px;
z-index:99999;
box-shadow:0 0 25px rgba(255,0,100,.4);
}

/* ONLINE */

.counter{
padding:10px 15px;
font-size:15px;
color:#00ff99;
}

/* TITLE */

.trending-title{
padding:10px 15px;
font-size:22px;
font-weight:bold;
color:#ff3d88;
}

/* ADS */

.ads-box{
display:flex;
justify-content:center;
align-items:center;
padding:10px;
margin-bottom:10px;
}

/* VIDEOS */

.video-container{
padding:15px;
display:grid;
gap:25px;
}

.video-card{
background:#140022;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,0,100,.2);
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.video-thumb{
position:relative;
}

.video-thumb video{
width:100%;
height:260px;
object-fit:cover;
background:black;
}

.premium-badge{
position:absolute;
top:10px;
left:10px;
background:#ff2f7d;
padding:8px 14px;
border-radius:12px;
font-size:14px;
font-weight:bold;
z-index:10;
}

.views-badge{
position:absolute;
top:10px;
right:10px;
background:red;
padding:8px 12px;
border-radius:12px;
font-weight:bold;
}

.video-info{
padding:15px;
}

.video-title{
font-size:20px;
margin-bottom:15px;
font-weight:bold;
line-height:1.4;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.action-btn{
background:#250040;
padding:14px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.action-btn:hover{
background:#3b0061;
}

.comments-btn{
margin-top:10px;
background:#250040;
padding:14px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.comments-btn:hover{
background:#3b0061;
}

/* FLOAT */

.telegram-float{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
border-radius:50%;
background:#0088cc;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
text-decoration:none;
color:white;
z-index:9999;
box-shadow:0 0 20px rgba(0,136,204,.5);
}

/* VIP */

.vip-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.vip-box{
background:#13001f;
padding:25px;
border-radius:25px;
width:100%;
max-width:500px;
line-height:2;
}

.vip-box h2{
color:#ff2f7d;
margin-bottom:15px;
}

.vip-box a{
display:block;
margin-top:20px;
background:#0088cc;
padding:15px;
text-align:center;
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* ADMIN */

.admin-panel{
padding:15px;
display:none;
}

.admin-box{
background:#13001f;
padding:20px;
border-radius:20px;
}

.admin-box input,
.admin-box select{
width:100%;
padding:18px;
margin-top:12px;
background:#24003d;
border:none;
color:white;
border-radius:15px;
font-size:16px;
}

.upload-btn{
margin-top:15px;
width:100%;
padding:18px;
font-size:20px;
font-weight:bold;
background:#ff2f7d;
color:white;
border:none;
border-radius:18px;
cursor:pointer;
}

/* TOAST */

.toast{
position:fixed;
top:20px;
right:20px;
background:#ff0066;
padding:15px 20px;
border-radius:14px;
display:none;
z-index:999999;
font-weight:bold;
}

/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

/* FOOTER */

footer{
text-align:center;
padding:40px 20px;
color:#888;
}

</style>

</head>
<body>

<!-- LOADER -->

<div class="loader" id="loader">

<img src="https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg">

<h2 style="margin-top:20px;color:#ff2f7d">
HABESHA PREMIUM
</h2>

</div>

<!-- INSTALL -->

<div class="install-banner" id="installBanner">

<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">

<div>

<h3 style="color:#ff2f7d">
📲 Install App
</h3>

<p style="font-size:14px;color:#ccc">
አሁን ጫን - Add To Home Screen
</p>

</div>

<button class="btn" id="installBtn">
INSTALL
</button>

</div>

</div>

<!-- VIP -->

<div class="vip-popup" id="vipPopup">

<div class="vip-box">

<h2>💍 PREMIUM 💎</h2>

<p>

<br>

የ3 ወር VIP 1200 ብር

</p>

<a href="https://t.me/Habeshapremiumvideo" target="_blank">

</a>

</div>

</div>

<!-- HEADER -->

<header>

<div class="logo">

<img src="https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg">

<h1>HABESHA PREMIUM</h1>

</div>

<div class="top-buttons">

<button class="btn" onclick="openVIP()">
💍 PREMIUM 💎
</button>

<button class="btn" onclick="enableAdminMode()">
ADMIN MODE
</button>

<button class="btn" onclick="openStats()">
📊 STATS
</button>

</div>

</header>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="🔍 Search videos...">

</div>

<!-- ONLINE -->

<div class="counter" id="onlineCounter">
245 users online
</div>

<!-- TITLE -->

<div class="trending-title">
🔥 TRENDING VIDEOS
</div>

<!-- ADS -->

<div class="ads-box">

<script async type="application/javascript"
src="https://a.magsrv.com/ad-provider.js"></script>

<ins class="eas6a97888e2"
data-zoneid="5927772"></ins>

<script>
(AdProvider = window.AdProvider || []).push({"serve": {}});
</script>

</div>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">

<div class="admin-box">

<input type="password"
id="adminPassword"
placeholder="Admin Password">

<input type="text"
id="videoTitle"
placeholder="Video Title">

<input type="text"
id="videoUrl"
placeholder="Dropbox MP4 Link">

<button class="upload-btn"
onclick="uploadVideo()">
UPLOAD VIDEO
</button>

</div>

</div>

<!-- VIDEOS -->

<div class="video-container"
id="videos"></div>

<!-- PAGINATION -->

<div class="pagination"
id="pagination"></div>

<!-- STATS -->

<div class="vip-popup" id="statsPopup">

<div class="vip-box">

<h2>📊 ANALYTICS</h2>

<div id="statsContent"></div>

<button class="btn"
onclick="closeStats()"
style="width:100%;margin-top:20px">
CLOSE
</button>

</div>

</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<!-- TELEGRAM -->

<a class="telegram-float"
href="https://t.me/Habeshapremiumvideo"
target="_blank">
✈
</a>

</footer>

<script>

const ADMIN_PASSWORD = "dawit12345";

let adminMode = false;

let currentPage = 1;

const videosPerPage = 5;

const defaultVideos = [

{
title:"Sample Video 🔥",
url:"https://www.w3schools.com/html/mov_bbb.mp4",
views:15,
likes:4,
poster:""
}

];

let videos =
JSON.parse(localStorage.getItem("videos"))
|| defaultVideos;

/* LOADER */

setTimeout(()=>{

document.getElementById(
"loader"
).style.display = "none";

},2500);

/* TOAST */

function showToast(text){

const toast =
document.getElementById("toast");

toast.innerText = text;

toast.style.display = "block";

setTimeout(()=>{

toast.style.display = "none";

},2500);

}

/* ADMIN */

function enableAdminMode(){

const pass =
prompt("Enter Admin Password");

if(pass === ADMIN_PASSWORD){

adminMode = true;

showToast("Admin Enabled ✅");

document.getElementById(
"adminPanel"
).style.display = "block";

window.scrollTo(0,0);

}else{

showToast("Wrong Password ❌");

}

}

/* VIP */

function openVIP(){

document.getElementById(
"vipPopup"
).style.display = "flex";

}

window.onclick = function(e){

if(e.target ==
document.getElementById("vipPopup")){

document.getElementById(
"vipPopup"
).style.display = "none";

}

if(e.target ==
document.getElementById("statsPopup")){

document.getElementById(
"statsPopup"
).style.display = "none";

}

}

/* UPLOAD */

function uploadVideo(){

const pass =
document.getElementById(
"adminPassword"
).value;

const title =
document.getElementById(
"videoTitle"
).value;

const url =
document.getElementById(
"videoUrl"
).value;

if(pass !== ADMIN_PASSWORD){

showToast("Wrong Password ❌");

return;

}

if(!title || !url){

showToast("Fill All Fields ⚠");

return;

}

let fixedUrl = url;

if(url.includes("dropbox.com")){

fixedUrl =
url.replace("dl=0","raw=1")
.replace("dl=1","raw=1");

}

videos.unshift({

title:title,
url:fixedUrl,
views:1,
likes:0,
poster:""

});

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

showToast("Upload Success ✅");

renderVideos();

}

/* LIKE */

function likeVideo(i){

videos[i].likes++;

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

showToast("Liked ❤️");

renderVideos();

}

/* SHARE */

async function shareVideo(url){

if(navigator.share){

navigator.share({

title:"HABESHA PREMIUM",
url:url

});

}else{

window.open(
`https://t.me/share/url?url=${url}`,
'_blank'
);

}

}

/* FAVORITE */

function favoriteVideo(i){

let favs =
JSON.parse(localStorage.getItem(
"favorites"
)) || [];

favs.push(videos[i]);

localStorage.setItem(
"favorites",
JSON.stringify(favs)
);

showToast("Saved ⭐");

}

/* DELETE */

function deleteVideo(i){

const pass =
prompt("Admin Password");

if(pass !== ADMIN_PASSWORD){

showToast("Wrong Password ❌");

return;

}

videos.splice(i,1);

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

showToast("Deleted 🗑");

renderVideos();

}

/* COMMENTS */

function addComment(i){

let comments =
JSON.parse(localStorage.getItem(
"comments"
)) || {};

const text =
prompt("Write Comment");

if(!text) return;

if(!comments[i]){

comments[i] = [];

}

comments[i].push(text);

localStorage.setItem(
"comments",
JSON.stringify(comments)
);

showToast("Comment Posted 💬");

renderVideos();

}

/* STATS */

function openStats(){

document.getElementById(
"statsPopup"
).style.display = "flex";

const totalViews =
videos.reduce((a,b)=>a+b.views,0);

const totalLikes =
videos.reduce((a,b)=>a+b.likes,0);

let totalComments = 0;

const comments =
JSON.parse(localStorage.getItem(
"comments"
)) || {};

Object.values(comments).forEach(c=>{

totalComments += c.length;

});

const topVideos =
[...videos]
.sort((a,b)=>b.views-a.views)
.slice(0,5);

document.getElementById(
"statsContent"
).innerHTML = `

<p>👁 Views: ${totalViews}</p>
<br>

<p>❤️ Likes: ${totalLikes}</p>
<br>

<p>💬 Comments: ${totalComments}</p>
<br>

<p>🎬 Videos: ${videos.length}</p>

<br><hr><br>

<h3>🔥 TOP 5</h3>

${topVideos.map((v,i)=>`
<p>${i+1}. ${v.title} (${v.views})</p>
`).join('')}

`;

}

function closeStats(){

document.getElementById(
"statsPopup"
).style.display = "none";

}

/* SEARCH */

document.getElementById(
"searchInput"
).addEventListener(
"input",
function(){

renderVideos(this.value);

}
);

/* RENDER */

function renderVideos(search=""){

const container =
document.getElementById("videos");

container.innerHTML = "";

let filtered =
videos.filter(v=>
v.title.toLowerCase()
.includes(search.toLowerCase())
);

const start =
(currentPage-1)
* videosPerPage;

const paginated =
filtered.slice(
start,
start + videosPerPage
);

paginated.forEach((video,index)=>{

const comments =
JSON.parse(localStorage.getItem(
"comments"
)) || {};

const commentCount =
comments[index]
? comments[index].length
: 0;

const card =
document.createElement("div");

card.className = "video-card";

card.innerHTML = `

<div class="video-thumb">

<div class="premium-badge">
PREMIUM
</div>

<div class="views-badge">
👁 ${video.views}
</div>

<video
controls
controlsList="nodownload"
poster=""
preload="metadata">

<source
src="${video.url}"
type="video/mp4">

</video>

</div>

<div class="video-info">

<div class="video-title">
${video.title}
</div>

<div class="actions">

<div class="action-btn">
👁 ${video.views}
</div>

<div class="action-btn"
onclick="likeVideo(${index})">
❤️ ${video.likes}
</div>

<div class="action-btn"
onclick="shareVideo('${video.url}')">
🔗 SHARE
</div>

</div>

<div class="comments-btn"
onclick="addComment(${index})">

💬 COMMENTS (${commentCount})

</div>

<div class="comments-btn"
onclick="favoriteVideo(${index})">

⭐ SAVE FAVORITE

</div>

<div class="comments-btn"
onclick="deleteVideo(${index})">

🗑 DELETE VIDEO

</div>

</div>

`;

container.appendChild(card);

const vid =
card.querySelector("video");

/* AUTO THUMBNAIL */

vid.addEventListener(
"loadedmetadata",
()=>{

vid.currentTime =
vid.duration * 0.25;

});

vid.addEventListener(
"seeked",
()=>{

const canvas =
document.createElement("canvas");

canvas.width =
vid.videoWidth;

canvas.height =
vid.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
vid,
0,
0,
canvas.width,
canvas.height
);

const img =
canvas.toDataURL();

vid.setAttribute(
"poster",
img
);

vid.currentTime = 0;

});

/* PROGRESS MEMORY */

const savedTime =
localStorage.getItem(
"progress_"+index
);

if(savedTime){

vid.currentTime = savedTime;

}

vid.addEventListener(
"timeupdate",
()=>{

localStorage.setItem(
"progress_"+index,
vid.currentTime
);

});

/* VIEW */

vid.addEventListener(
"play",
()=>{

video.views++;

localStorage.setItem(
"videos",
JSON.stringify(videos)
);

});

/* DOUBLE TAP LIKE */

vid.addEventListener(
"dblclick",
()=>{

likeVideo(index);

});

});

renderPagination(filtered.length);

}

/* PAGINATION */

function renderPagination(total){

const pagination =
document.getElementById(
"pagination"
);

pagination.innerHTML = "";

const pages =
Math.ceil(total/videosPerPage);

for(let i=1;i<=pages;i++){

pagination.innerHTML += `

<button class="btn"
onclick="
currentPage=${i};
renderVideos();
">

${i}

</button>

`;

}

}

/* ONLINE */

setInterval(()=>{

const num =
Math.floor(Math.random()*500)+100;

document.getElementById(
"onlineCounter"
).innerText =
`${num} users online`;

},4000);

/* INSTALL */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

setTimeout(()=>{

document.getElementById(
"installBanner"
).style.display = "block";

},3000);

});

document.getElementById(
"installBtn"
).addEventListener(
"click",
async()=>{

if(deferredPrompt){

deferredPrompt.prompt();

showToast("Installing App 📲");

}

});

/* SERVICE WORKER */

if("serviceWorker" in navigator){

const swCode = `

self.addEventListener(
'fetch',
e=>{

e.respondWith(

caches.match(e.request)
.then(res=>{

return res || fetch(e.request)

})

)

})

`;

const blob =
new Blob([swCode],
{type:'text/javascript'});

const swURL =
URL.createObjectURL(blob);

navigator.serviceWorker.register(
swURL
);

}

/* START */

renderVideos();

/* BLOCK RIGHT CLICK */

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

</script>

</body>
