<!DOCTYPE html>
<html lang="am">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HABESHA PREMIUM</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#ff3366;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f0c20,#150e2a,#110721);
    color:white;
    min-height:100vh;
}

/* HEADER */

header{
    position:sticky;
    top:0;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:rgba(17,13,38,0.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:700;
}

.logo span{
    color:var(--primary);
}

.logo img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--primary);
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    cursor:pointer;
}

.theme-btn,
.admin-btn{
    padding:10px 14px;
    border-radius:12px;
    background:#241b46;
    color:white;
    font-weight:600;
}

/* SEARCH */

.search-box{
    padding:15px;
    position:relative;
}

.search-box span{
    position:absolute;
    left:28px;
    top:29px;
    color:#999;
}

.search-box input{
    width:100%;
    padding:14px 14px 14px 40px;
    border:none;
    border-radius:14px;
    background:#1a1337;
    color:white;
    font-size:14px;
}

/* CATEGORY */

.categories{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:0 15px 15px;
}

.categories button{
    min-width:170px;
    padding:13px 18px;
    border-radius:18px;
    font-size:14px;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#ff3366,#7b2ff7);
    box-shadow:0 6px 20px rgba(255,51,102,0.35);
}

/* ADMIN */

.admin-section{
    display:none;
    margin:15px;
    padding:15px;
    border-radius:20px;
    background:#17112d;
}

.admin-section h3{
    margin-bottom:12px;
    color:var(--primary);
}

.admin-section input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#241b46;
    color:white;
}

#upload-btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:bold;
}

/* VIDEOS */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
    padding:15px;
}

.video-card{
    position:relative;
    border-radius:22px;
    overflow:hidden;
    background:#17112d;
    transition:0.3s;
}

.video-card:hover{
    transform:translateY(-4px);
}

.trending{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff3366;
    padding:5px 10px;
    border-radius:8px;
    font-size:11px;
    font-weight:bold;
    z-index:10;
}

.watching{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    padding:5px 10px;
    border-radius:8px;
    font-size:11px;
    z-index:10;
}

.play-icon{
    position:absolute;
    top:35%;
    left:50%;
    transform:translate(-50%,-50%);
    width:75px;
    height:75px;
    border-radius:50%;
    background:rgba(0,0,0,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    pointer-events:none;
}

video{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

.video-info{
    padding:14px;
}

.video-title{
    font-size:15px;
    font-weight:600;
    margin-bottom:10px;
}

.video-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.action-btn{
    flex:1;
    padding:10px;
    border-radius:10px;
    background:#241b46;
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

/* COMMENTS */

.comments-container{
    display:none;
    margin-top:12px;
}

.comment{
    padding:8px;
    border-radius:10px;
    background:#241b46;
    margin-top:6px;
    font-size:12px;
}

.comment-input input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#241b46;
    color:white;
}

.comment-box{
    margin-top:8px;
    padding:10px;
    border-radius:10px;
    background:var(--primary);
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

/* PREMIUM POPUP */

.premium-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.premium-box{
    width:100%;
    max-width:420px;
    background:#17112d;
    border-radius:25px;
    padding:25px;
    text-align:center;
}

.premium-box h2{
    color:#ff3366;
    margin-bottom:15px;
}

.premium-box p{
    margin-bottom:12px;
    line-height:1.7;
}

.vip-price{
    margin-top:10px;
    padding:12px;
    border-radius:14px;
    background:#241b46;
    font-size:14px;
    font-weight:600;
}

.telegram-btn{
    display:block;
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    background:#229ED9;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.close-popup{
    margin-top:15px;
    color:#aaa;
    cursor:pointer;
}

/* FOOTER */

footer{
    padding:30px 20px 100px;
    text-align:center;
    color:#888;
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:10px;
    }

    .grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="https://i.ibb.co/nMTFY1w8/IMG-20260515-123744-362.jpg">
HABESHA <span>PREMIUM</span>
</div>

<div class="buttons">

<button class="theme-btn">
🔥 VIP
</button>

<button class="admin-btn" id="admin-toggle">
ADMIN
</button>

</div>

</header>

<!-- SEARCH -->

<div class="search-box">

<span>🔍</span>

<input
type="text"
id="search-input"
placeholder="ፈልግ...">

</div>

<!-- CATEGORY -->

<div class="categories">

<button id="xxx-btn">
🔥 XXX 🍑
</button>

<button id="premium-btn">
💍 PREMIUM 💎
</button>

</div>

<!-- ADMIN -->

<div class="admin-section" id="admin-panel">

<h3>አዲስ ቪዲዮ ጫን</h3>

<input
type="text"
id="video-title"
placeholder="የቪዲዮ ርዕስ">

<input
type="text"
id="video-url"
placeholder="MP4 LINK">

<input
type="password"
id="admin-pass"
placeholder="ADMIN PASSWORD">

<button id="upload-btn">
UPLOAD VIDEO
</button>

</div>

<!-- VIDEOS -->

<div class="grid" id="video-grid"></div>

<!-- PREMIUM POPUP -->

<div class="premium-popup" id="premium-popup">

<div class="premium-box">

<h2>💍 PREMIUM VIP 💎</h2>

<p>
ሰላም እንኳን ወደ premium (VIP) በሰላም መጣህ
</p>

<p>
እባክዎ ይምረጡ
</p>

<div class="vip-price">
የ1 ወር VIP VIDEO — 500 ብር
</div>

<div class="vip-price">
የ3 ወር VIP VIDEO — 1200 ብር
</div>

<div class="vip-price">
የ6 ወር VIP VIDEO — 2500 ብር
</div>

<div class="vip-price">
የ1 አመት VIP VIDEO — 4000 ብር
</div>

<a
href="https://t.me/Habeshapremiumvideo"
target="_blank"
class="telegram-btn">

💬 ለመክፈል Telegram ይክፈቱ

</a>

<div
class="close-popup"
onclick="closePremium()">

✖ CLOSE

</div>

</div>

</div>

<footer>
© 2026 HABESHA PREMIUM
</footer>

<script>

/* FIREBASE */

const firebaseConfig = {

databaseURL:
"https://YOUR-FIREBASE-URL.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();

/* ELEMENTS */

const videoGrid =
document.getElementById("video-grid");

const adminToggle =
document.getElementById("admin-toggle");

const adminPanel =
document.getElementById("admin-panel");

const uploadBtn =
document.getElementById("upload-btn");

const searchInput =
document.getElementById("search-input");

const premiumBtn =
document.getElementById("premium-btn");

const premiumPopup =
document.getElementById("premium-popup");

/* DATA */

let allVideos = [];

/* ADMIN PANEL */

adminToggle.onclick = ()=>{

adminPanel.style.display =
adminPanel.style.display === "block"
? "none"
: "block";

};

/* PREMIUM POPUP */

premiumBtn.onclick = ()=>{

premiumPopup.style.display = "flex";

};

function closePremium(){

premiumPopup.style.display = "none";

}

/* UPLOAD */

uploadBtn.onclick = ()=>{

const title =
document.getElementById("video-title")
.value.trim();

const url =
document.getElementById("video-url")
.value.trim();

const pass =
document.getElementById("admin-pass")
.value.trim();

if(pass !== "dawit123"){

alert("Wrong Password");

return;

}

if(!title || !url){

alert("Fill All Fields");

return;

}

uploadBtn.innerText = "Uploading...";

database.ref("videos").push({

title:title,
url:url,
views:0,
likes:0,
watching:
Math.floor(Math.random()*100)+1,
createdAt:Date.now()

}).then(()=>{

alert("Uploaded Successfully");

document.getElementById(
"video-title"
).value = "";

document.getElementById(
"video-url"
).value = "";

document.getElementById(
"admin-pass"
).value = "";

uploadBtn.innerText =
"UPLOAD VIDEO";

});

};

/* LOAD VIDEOS */

function loadVideos(){

database.ref("videos")
.on("value",(snapshot)=>{

videoGrid.innerHTML = "";

allVideos = [];

const data = snapshot.val();

if(!data){

videoGrid.innerHTML =
"<h2>No Videos</h2>";

return;

}

for(let key in data){

allVideos.push({

id:key,
...data[key]

});

}

allVideos.sort(
(a,b)=>b.createdAt-a.createdAt
);

displayVideos(allVideos);

});

}

/* DISPLAY */

function displayVideos(videos){

videoGrid.innerHTML = "";

videos.forEach((video)=>{

const card =
document.createElement("div");

card.className = "video-card";

card.innerHTML = `

<div class="trending">
PREMIUM
</div>

<div class="watching">
🔴 ${video.watching || 1} watching
</div>

<div class="play-icon">
▶
</div>

<video
controls
playsinline
preload="metadata">

<source
src="${video.url}"
type="video/mp4">

</video>

<div class="video-info">

<div class="video-title">
${video.title}
</div>

<div class="video-actions">

<div class="action-btn">
👁 ${video.views || 0}
</div>

<div
class="action-btn"
onclick="likeVideo('${video.id}')">

❤️ ${video.likes || 0}

</div>

<div
class="action-btn"
onclick="shareVideo('${video.id}')">

🔗 SHARE

</div>

</div>

<div
class="action-btn"
style="margin-top:10px;"
onclick="toggleComments('${video.id}')">

💬 COMMENTS

</div>

<div
class="comments-container"
id="comments-${video.id}">

<div id="list-${video.id}"></div>

<div class="comment-input">

<input
type="text"
id="input-${video.id}"
placeholder="Write comment...">

<div
class="comment-box"
onclick="addComment('${video.id}')">

SEND

</div>

</div>

</div>

</div>
`;

videoGrid.appendChild(card);

/* VIEWS */

const videoElement =
card.querySelector("video");

videoElement.addEventListener(
"play",
()=>{

database.ref(
"videos/" +
video.id +
"/views"

).transaction((views)=>{

return (views || 0) + 1;

});

},
{ once:true }
);

/* LIVE WATCHING */

setInterval(()=>{

const watching =
card.querySelector(".watching");

const random =
Math.floor(Math.random()*100)+1;

watching.innerHTML =
`🔴 ${random} watching`;

},5000);

});

}

/* LIKE */

window.likeVideo = function(id){

database.ref(
"videos/" + id + "/likes"
).transaction((likes)=>{

return (likes || 0) + 1;

});

};

/* SHARE */

window.shareVideo = function(id){

const link =
window.location.origin +
window.location.pathname +
"?v=" + id;

navigator.clipboard
.writeText(link)
.then(()=>{

alert("Link Copied");

});

};

/* COMMENTS */

window.toggleComments = function(id){

const container =
document.getElementById(
`comments-${id}`
);

if(container.style.display
=== "block"){

container.style.display = "none";

}else{

container.style.display = "block";

loadComments(id);

}

};

function loadComments(id){

const list =
document.getElementById(
`list-${id}`
);

database.ref(`comments/${id}`)
.on("value",(snapshot)=>{

list.innerHTML = "";

const data = snapshot.val();

if(!data){

list.innerHTML =
"<p>No comments yet</p>";

return;

}

for(let key in data){

const div =
document.createElement("div");

div.className = "comment";

div.innerText =
data[key].text;

list.appendChild(div);

}

});

}

/* ADD COMMENT */

window.addComment = function(id){

const input =
document.getElementById(
`input-${id}`
);

const text =
input.value.trim();

if(!text){
return;
}

database.ref(
`comments/${id}`
).push({

text:text,
timestamp:Date.now()

}).then(()=>{

input.value = "";

});

};

/* SEARCH */

searchInput.addEventListener(
"input",
(e)=>{

const query =
e.target.value.toLowerCase();

const filtered =
allVideos.filter(video=>

video.title
.toLowerCase()
.includes(query)

);

displayVideos(filtered);

});

/* START */

window.onload = ()=>{

loadVideos();

};

</script>

</body>
</html>
