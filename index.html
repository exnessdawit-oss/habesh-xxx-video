<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habesha Premium Video</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .admin-panel { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #ef4444; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ef4444; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { background: #1e293b; border-radius: 10px; overflow: hidden; padding-bottom: 10px; }
        .video-card img { width: 100%; height: 150px; object-fit: cover; }
        .video-card h3 { padding: 10px; margin: 0; font-size: 16px; }
        .watch-btn { display: block; text-align: center; background: #3b82f6; color: white; text-decoration: none; margin: 0 10px; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h3><span style="color:#ef4444;">+</span> አዲስ ቪዲዮ አስተዳድር</h3>
        <input type="text" id="vTitle" placeholder="የዛሬው video">
        <input type="text" id="vThumb" placeholder="የፎቶ (Thumbnail) URL">
        <input type="text" id="vUrl" placeholder="የቪዲዮ (MP4) URL">
        <button onclick="addVideo()">ቪዲዮውን አክል</button>
    </div>

    <h2>FEATURED CONTENT</h2>
    <div class="grid" id="videoGrid"></div>

    <script>
        // የአንተ Firebase መረጃ እዚህ ይገባል
        const firebaseConfig = {
            databaseURL: "https://habesha-xxx-video-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ቪዲዮ ለመጨመር
        function addVideo() {
            const title = document.getElementById('vTitle').value;
            const thumb = document.getElementById('vThumb').value;
            const url = document.getElementById('vUrl').value;

            if(title && thumb && url) {
                db.ref('videos').push({
                    title: title,
                    thumbnail: thumb,
                    videoUrl: url
                }).then(() => {
                    alert("ቪዲዮው በትክክል ተጨምሯል!");
                    location.reload();
                }).catch(err => alert("ስህተት፡ " + err.message));
            } else {
                alert("እባክህ ሁሉንም ቦታ ሙላ!");
            }
        }

        // ቪዲዮዎችን ለማሳየት
        db.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                grid.innerHTML += `
                    <div class="video-card">
                        <img src="${data.thumbnail}" alt="thumb">
                        <h3>${data.title}</h3>
                        <a href="${data.videoUrl}" class="watch-btn" target="_blank">አሁን እይ</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
